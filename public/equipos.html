<div class="eqv2-wrap">

    <!-- Header -->
    <div class="eqv2-header">
        <div>
            <h1 class="equip-titulo">Equipamiento</h1>
        </div>
        <button class="eq-btn-primary" id="eqv2-btn-nuevo">+ Registrar equipo</button>
    </div>

    <!-- Tabs -->
    <div class="eqv2-tabs">
        <button class="eqv2-tab active" id="eqv2-tab-inventario">📦 Inventario</button>
        <button class="eqv2-tab" id="eqv2-tab-registrar">➕ Registrar</button>
        <button class="eqv2-tab" id="eqv2-tab-mantenimientos">🔧 Mantenimientos</button>
        <button class="eqv2-tab" id="eqv2-tab-incidencias">
            ⚠️ Incidencias <span class="eqv2-tab-badge" id="eqv2-badge-inc" style="display:none">0</span>
        </button>
    </div>

    <!-- ══ PANEL: INVENTARIO ══ -->
    <div class="eqv2-panel active" id="eqv2-panel-inventario">

        <div class="eqv2-stats-row">
            <div class="eqv2-stat-box"><div class="eqv2-stat-val" id="st-total">—</div><div class="eqv2-stat-lbl">Total equipos</div></div>
            <div class="eqv2-stat-box"><div class="eqv2-stat-val" style="color:#84cc16" id="st-op">—</div><div class="eqv2-stat-lbl">Operativos</div></div>
            <div class="eqv2-stat-box"><div class="eqv2-stat-val" style="color:#f59e0b" id="st-rev">—</div><div class="eqv2-stat-lbl">En revisión</div></div>
            <div class="eqv2-stat-box"><div class="eqv2-stat-val" style="color:#f43f5e" id="st-fs">—</div><div class="eqv2-stat-lbl">Fuera de servicio</div></div>
        </div>

        <div class="eqv2-card">
            <div class="eqv2-card-title">Inventario · Listado de equipos</div>

            <div class="eqv2-toolbar">
                <input class="eqv2-input" id="inv-buscar" placeholder="🔍 Buscar por nombre o serie…">
                <select class="eqv2-select" id="inv-cat">
                    <option value="">Todas las categorías</option>
                    <option>Cardio</option><option>Musculación</option>
                    <option>Funcional</option><option>Accesorios</option>
                </select>
                <select class="eqv2-select" id="inv-estado">
                    <option value="">Todos los estados</option>
                    <option>Operativo</option><option>En revisión</option><option>Fuera de servicio</option>
                </select>
                <select class="eqv2-select" id="inv-sector">
                    <option value="">Todos los sectores</option>
                    <option>Sala principal</option><option>Sala 2</option>
                    <option>Peso libre</option><option>Funcional</option>
                </select>
                <span class="eqv2-badge-alerta" id="inv-alerta" style="display:none">⚠️ Equipos con alerta: 0</span>
            </div>

            <div style="overflow-x:auto">
                <table class="eqv2-table">
                    <thead>
                        <tr>
                            <th>Equipo</th><th>Categoría</th><th>Sector</th>
                            <th>Estado</th><th>Próx. Mant.</th><th>Responsable</th><th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="inv-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ══ PANEL: REGISTRAR ══ -->
    <div class="eqv2-panel" id="eqv2-panel-registrar">
        <div class="eqv2-card">
            <div class="eqv2-card-title" id="eqv2-form-titulo">Alta de equipo · Cargar nuevo equipamiento</div>

            <div class="eqv2-form-grid">
                <div class="full">
                    <label class="eqv2-label">Nombre del equipo *</label>
                    <input class="eqv2-input" id="eq-nombre" placeholder="Ej: Cinta de correr X900">
                </div>
                <div>
                    <label class="eqv2-label">Categoría *</label>
                    <select class="eqv2-select" id="eq-cat" style="width:100%">
                        <option value="" disabled selected>Seleccionar</option>
                        <option>Cardio</option><option>Musculación</option>
                        <option>Funcional</option><option>Accesorios</option>
                    </select>
                </div>
                <div>
                    <label class="eqv2-label">Estado inicial</label>
                    <select class="eqv2-select" id="eq-estado" style="width:100%">
                        <option>Operativo</option><option>En revisión</option><option>Fuera de servicio</option>
                    </select>
                </div>
                <div>
                    <label class="eqv2-label">Marca</label>
                    <input class="eqv2-input" id="eq-marca" placeholder="Ej: Technogym">
                </div>
                <div>
                    <label class="eqv2-label">Modelo</label>
                    <input class="eqv2-input" id="eq-modelo" placeholder="Ej: Run Pro 900">
                </div>
                <div>
                    <label class="eqv2-label">Número de serie</label>
                    <input class="eqv2-input" id="eq-serie" placeholder="Ej: EQ-2026-001">
                </div>
                <div>
                    <label class="eqv2-label">Ubicación / Sector</label>
                    <select class="eqv2-select" id="eq-sector" style="width:100%">
                        <option value="" disabled selected>Seleccionar</option>
                        <option>Sala principal</option><option>Sala 2</option>
                        <option>Peso libre</option><option>Funcional</option>
                    </select>
                </div>
                <div>
                    <label class="eqv2-label">Fecha de compra</label>
                    <input class="eqv2-input" type="date" id="eq-compra">
                </div>
                <div>
                    <label class="eqv2-label">Próximo mantenimiento</label>
                    <input class="eqv2-input" type="date" id="eq-mant">
                </div>
                <div>
                    <label class="eqv2-label">Responsable de mantenimiento</label>
                    <input class="eqv2-input" id="eq-resp" placeholder="Ej: Mariano López">
                </div>
                <div class="full">
                    <label class="eqv2-label">Notas / Observaciones</label>
                    <input class="eqv2-input" id="eq-obs" placeholder="Ej: Revisar correa cada 6 meses">
                </div>
                <div class="full" style="display:flex;gap:12px;margin-top:8px">
                    <button class="eqv2-btn-ghost" id="eqv2-btn-limpiar">Limpiar</button>
                    <button class="eq-btn-primary" id="eqv2-btn-guardar" style="margin-left:auto">Registrar equipo</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ PANEL: MANTENIMIENTOS ══ -->
    <div class="eqv2-panel" id="eqv2-panel-mantenimientos">
        <div class="eqv2-card">
            <div class="eqv2-card-title">Próximos mantenimientos</div>
            <div class="eqv2-mant-list" id="eqv2-mant-list"></div>
        </div>
    </div>

    <!-- ══ PANEL: INCIDENCIAS ══ -->
    <div class="eqv2-panel" id="eqv2-panel-incidencias">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
            <select class="eqv2-select" id="inc-filtro">
                <option value="">Todas las incidencias</option>
                <option value="Abierta">Abiertas</option>
                <option value="En progreso">En progreso</option>
                <option value="Resuelta">Resueltas</option>
            </select>
            <button class="eq-btn-primary" id="eqv2-btn-nueva-inc">+ Nueva incidencia</button>
        </div>
        <div class="eqv2-inc-list" id="eqv2-inc-list"></div>
    </div>

</div>

<!-- Modal nueva incidencia -->
<div id="eqv2-modal-inc" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center">
    <div class="modal-box" style="max-width:460px">
        <h3 class="modal-titulo">⚠️ Registrar incidencia</h3>
        <div style="display:flex;flex-direction:column;gap:14px;margin-top:16px">
            <div>
                <label class="modal-label">EQUIPO *</label>
                <select class="admin-input" id="inc-equipo-sel"></select>
            </div>
            <div>
                <label class="modal-label">TIPO *</label>
                <select class="admin-input" id="inc-tipo-sel">
                    <option>Falla mecánica</option><option>Falla eléctrica</option>
                    <option>Daño físico</option><option>Desgaste</option><option>Otro</option>
                </select>
            </div>
            <div>
                <label class="modal-label">PRIORIDAD</label>
                <select class="admin-input" id="inc-prio-sel">
                    <option>Alta</option><option selected>Media</option><option>Baja</option>
                </select>
            </div>
            <div>
                <label class="modal-label">DESCRIPCIÓN *</label>
                <textarea class="admin-input" id="inc-desc-inp" rows="3" placeholder="Detalle del problema…" style="resize:vertical"></textarea>
            </div>
            <div style="display:flex;gap:10px;margin-top:4px">
                <button class="det-btn-volver" style="flex:1" id="eqv2-modal-cancelar">Cancelar</button>
                <button class="eq-btn-primary" style="flex:1" id="eqv2-modal-guardar">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    let equiposData = [];
    let incidenciasData = [];
    let modoEdicion = null; // id del equipo en edición

    // ── Helpers ───────────────────────────────────────────────────────────

    // Convierte "dd/mm/yyyy" o "—" a "yyyy-mm-dd" para input[type=date]
    function toInputDate(str) {
        if (!str || str === '—') return '';
        const p = str.split('/');
        if (p.length !== 3) return '';
        return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    }

    // Convierte "yyyy-mm-dd" a "dd/mm/yyyy"
    function toDisplayDate(str) {
        if (!str) return '—';
        const [y, m, d] = str.split('-');
        return `${d}/${m}/${y}`;
    }

    // ── Carga de datos ────────────────────────────────────────────────────

    async function cargarEquipos() {
        equiposData = await fetch('/api/equipos').then(r => r.json()).catch(() => []);
    }

    async function cargarIncidencias() {
        incidenciasData = await fetch('/api/incidencias/todas').then(r => r.json()).catch(() => []);
        actualizarBadgeInc();
    }

    function actualizarBadgeInc() {
        const abiertas = incidenciasData.filter(i => i.estado !== 'Resuelta').length;
        const badge = document.getElementById('eqv2-badge-inc');
        if (abiertas > 0) {
            badge.textContent = abiertas;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }
    }

    // ── Tabs ──────────────────────────────────────────────────────────────

    function activarTab(nombre) {
        document.querySelectorAll('.eqv2-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.eqv2-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('eqv2-panel-' + nombre).classList.add('active');
        document.getElementById('eqv2-tab-' + nombre).classList.add('active');
        if (nombre === 'inventario')     renderInventario();
        if (nombre === 'mantenimientos') renderMantenimientos();
        if (nombre === 'incidencias')    renderIncidencias();
        if (nombre === 'registrar' && !modoEdicion) limpiarFormulario();
    }

    document.getElementById('eqv2-tab-inventario').onclick     = () => activarTab('inventario');
    document.getElementById('eqv2-tab-registrar').onclick      = () => { modoEdicion = null; activarTab('registrar'); };
    document.getElementById('eqv2-tab-mantenimientos').onclick  = () => activarTab('mantenimientos');
    document.getElementById('eqv2-tab-incidencias').onclick     = () => activarTab('incidencias');
    document.getElementById('eqv2-btn-nuevo').onclick           = () => { modoEdicion = null; activarTab('registrar'); };

    // ── Inventario ────────────────────────────────────────────────────────

    function renderInventario() {
        const buscar = document.getElementById('inv-buscar').value.toLowerCase();
        const cat    = document.getElementById('inv-cat').value;
        const estado = document.getElementById('inv-estado').value;
        const sector = document.getElementById('inv-sector').value;

        const lista = equiposData.filter(e =>
            (!buscar || e.nombre.toLowerCase().includes(buscar) || (e.serie||'').toLowerCase().includes(buscar)) &&
            (!cat    || e.categoria === cat) &&
            (!estado || e.estado    === estado) &&
            (!sector || e.sector    === sector)
        );

        // Stats
        document.getElementById('st-total').innerText = equiposData.length;
        document.getElementById('st-op').innerText    = equiposData.filter(e => e.estado === 'Operativo').length;
        document.getElementById('st-rev').innerText   = equiposData.filter(e => e.estado === 'En revisión').length;
        document.getElementById('st-fs').innerText    = equiposData.filter(e => e.estado === 'Fuera de servicio').length;

        // Badge alerta
        const conAlerta = equiposData.filter(e => e.estado !== 'Operativo').length;
        const badge = document.getElementById('inv-alerta');
        if (conAlerta > 0) { badge.style.display = 'inline-block'; badge.textContent = `⚠️ Equipos con alerta: ${conAlerta}`; }
        else badge.style.display = 'none';

        const tbody = document.getElementById('inv-body');
        if (!lista.length) {
            tbody.innerHTML = `<tr><td colspan="7">
                <div class="eqv2-empty"><div class="eqv2-empty-icon">🏋️</div><p>No se encontraron equipos con esos filtros.</p></div>
            </td></tr>`;
            return;
        }

        const hoy = new Date(); hoy.setHours(0,0,0,0);
        tbody.innerHTML = lista.map(e => {
            const pillClass = e.estado === 'Operativo' ? 'eqv2-pill-op' : e.estado === 'En revisión' ? 'eqv2-pill-rev' : 'eqv2-pill-fs';
            const mantRaw   = toInputDate(e.mantenimiento);
            const mantDate  = mantRaw ? new Date(mantRaw + 'T00:00:00') : null;
            const mantStr   = e.mantenimiento || '—';
            const diffMant  = mantDate ? Math.ceil((mantDate - hoy) / 86400000) : 999;
            const mantColor = diffMant <= 7 ? 'color:#f43f5e' : diffMant <= 30 ? 'color:#f59e0b' : 'color:var(--text-soft)';
            return `
            <tr>
                <td><div class="eqv2-eq-nombre">${e.nombre}</div><div class="eqv2-eq-marca">${e.marca||''} ${e.modelo||''} · ${e.serie||''}</div></td>
                <td>${e.categoria||'—'}</td>
                <td>${e.sector||'—'}</td>
                <td><span class="eqv2-pill ${pillClass}">${e.estado}</span></td>
                <td style="${mantColor};font-size:.82rem;font-weight:700">${mantStr}</td>
                <td style="font-size:.82rem;color:var(--text-soft)">${e.responsable||'—'}</td>
                <td>
                    <div style="display:flex;gap:6px">
                        <button class="eqv2-btn-ghost" style="padding:7px 12px;font-size:.8rem" onclick="eqv2EditarEquipo(${e.id})">✏️ Editar</button>
                        <button class="eqv2-btn-danger" onclick="eqv2EliminarEquipo(${e.id})">🗑️</button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    ['inv-buscar','inv-cat','inv-estado','inv-sector'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', renderInventario);
        el.addEventListener('change', renderInventario);
    });

    // ── Formulario ────────────────────────────────────────────────────────

    function limpiarFormulario() {
        modoEdicion = null;
        ['eq-nombre','eq-marca','eq-modelo','eq-serie','eq-resp','eq-obs','eq-compra','eq-mant'].forEach(id => {
            const el = document.getElementById(id); if (el) el.value = '';
        });
        const cat = document.getElementById('eq-cat'); if (cat) cat.selectedIndex = 0;
        const sec = document.getElementById('eq-sector'); if (sec) sec.selectedIndex = 0;
        const est = document.getElementById('eq-estado'); if (est) est.selectedIndex = 0;
        document.getElementById('eqv2-form-titulo').innerText = 'Alta de equipo · Cargar nuevo equipamiento';
        document.getElementById('eqv2-btn-guardar').innerText = 'Registrar equipo';
    }

    window.eqv2EditarEquipo = function(id) {
        const e = equiposData.find(x => x.id === id);
        if (!e) return;
        modoEdicion = id;
        activarTab('registrar');
        document.getElementById('eqv2-form-titulo').innerText = 'Editar equipo';
        document.getElementById('eqv2-btn-guardar').innerText = 'Guardar cambios';
        const set = (elId, val) => { const el = document.getElementById(elId); if (el) el.value = val || ''; };
        set('eq-nombre', e.nombre);
        set('eq-marca',  e.marca);
        set('eq-modelo', e.modelo);
        set('eq-serie',  e.serie);
        set('eq-resp',   e.responsable);
        set('eq-obs',    e.obs);
        set('eq-cat',    e.categoria);
        set('eq-estado', e.estado);
        set('eq-sector', e.sector);
        set('eq-mant',   toInputDate(e.mantenimiento));
        set('eq-compra', toInputDate(e.compra));
    };

    window.eqv2EliminarEquipo = async function(id) {
        const e = equiposData.find(x => x.id === id);
        const ok = await confirmar({
            icono: '🗑️',
            titulo: '¿Eliminar equipo?',
            detalle: `Se eliminará <strong>${e?.nombre||'este equipo'}</strong> del inventario.<br>Esta acción no se puede deshacer.`,
            labelOk: 'Sí, eliminar',
            colorOk: '#ef4444',
            colorOkText: '#fff'
        });
        if (!ok) return;
        await fetch(`/api/equipos/${id}`, { method: 'DELETE' });
        await cargarEquipos();
        await cargarIncidencias();
        renderInventario();
    };

    document.getElementById('eqv2-btn-limpiar').onclick = limpiarFormulario;

    document.getElementById('eqv2-btn-guardar').onclick = async function() {
        const nombre = document.getElementById('eq-nombre').value.trim();
        const cat    = document.getElementById('eq-cat').value;
        if (!nombre || !cat) { alert('Completá al menos el nombre y la categoría.'); return; }

        const esNuevo = !modoEdicion;
        const ok = await confirmar(esNuevo ? {
            icono: '✅',
            titulo: '¿Registrar equipo?',
            detalle: `Se agregará <strong>${nombre}</strong> al inventario.`,
            labelOk: 'Sí, registrar'
        } : {
            icono: '💾',
            titulo: '¿Guardar cambios?',
            detalle: `Se actualizarán los datos de <strong>${nombre}</strong>.`,
            labelOk: 'Sí, guardar'
        });
        if (!ok) return;

        const datos = {
            nombre,
            categoria:     cat,
            estado:        document.getElementById('eq-estado').value,
            marca:         document.getElementById('eq-marca').value.trim(),
            modelo:        document.getElementById('eq-modelo').value.trim(),
            serie:         document.getElementById('eq-serie').value.trim() || ('EQ-' + Date.now()),
            sector:        document.getElementById('eq-sector').value,
            mantenimiento: toDisplayDate(document.getElementById('eq-mant').value),
            compra:        toDisplayDate(document.getElementById('eq-compra').value),
            responsable:   document.getElementById('eq-resp').value.trim(),
            obs:           document.getElementById('eq-obs').value.trim(),
        };

        if (modoEdicion) {
            await fetch(`/api/equipos/${modoEdicion}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datos)
            });
        } else {
            await fetch('/api/equipos', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datos)
            });
        }

        await cargarEquipos();
        limpiarFormulario();
        activarTab('inventario');
    };

    // ── Mantenimientos ────────────────────────────────────────────────────

    function renderMantenimientos() {
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        const sorted = [...equiposData]
            .filter(e => e.mantenimiento && e.mantenimiento !== '—')
            .map(e => ({ ...e, _mantDate: new Date(toInputDate(e.mantenimiento) + 'T00:00:00') }))
            .sort((a, b) => a._mantDate - b._mantDate);

        const list = document.getElementById('eqv2-mant-list');
        if (!sorted.length) {
            list.innerHTML = `<div class="eqv2-empty"><div class="eqv2-empty-icon">🔧</div><p>No hay mantenimientos registrados.</p></div>`;
            return;
        }

        list.innerHTML = sorted.map(e => {
            const diff  = Math.ceil((e._mantDate - hoy) / 86400000);
            const cls   = diff < 0 ? 'urgente' : diff <= 14 ? 'proximo' : 'ok';
            const label = diff < 0 ? `Vencido hace ${Math.abs(diff)} días` : diff === 0 ? 'Hoy' : `En ${diff} días`;
            return `
            <div class="eqv2-mant-item">
                <div class="eqv2-mant-icon">🔧</div>
                <div class="eqv2-mant-info">
                    <div class="eqv2-mant-nombre">${e.nombre}</div>
                    <div class="eqv2-mant-meta">${e.categoria||''} · ${e.sector||''} · Resp: ${e.responsable||'—'}</div>
                </div>
                <div class="eqv2-mant-fecha ${cls}">${e.mantenimiento}<br><small>${label}</small></div>
            </div>`;
        }).join('');
    }

    // ── Incidencias ───────────────────────────────────────────────────────

    function renderIncidencias() {
        const filtro = document.getElementById('inc-filtro').value;
        const lista  = filtro ? incidenciasData.filter(i => i.estado === filtro) : [...incidenciasData];
        const list   = document.getElementById('eqv2-inc-list');

        if (!lista.length) {
            list.innerHTML = `<div class="eqv2-empty"><div class="eqv2-empty-icon">✅</div><p>Sin incidencias ${filtro ? 'con ese estado' : 'registradas'}.</p></div>`;
            return;
        }

        const pillEst = { 'Abierta': 'eqv2-pill-abierta', 'En progreso': 'eqv2-pill-proceso', 'Resuelta': 'eqv2-pill-resuelta' };
        const pillPrio = { 'Alta': 'eqv2-pill-alta', 'Media': 'eqv2-pill-media', 'Baja': 'eqv2-pill-baja' };

        list.innerHTML = lista.map(i => {
            const eq = equiposData.find(e => e.id === i.equipoId);
            return `
            <div class="eqv2-inc-item">
                <div class="eqv2-inc-top">
                    <div class="eqv2-inc-icon">⚠️</div>
                    <div style="flex:1">
                        <div class="eqv2-inc-titulo">${i.tipo}</div>
                        <div class="eqv2-inc-equipo">${eq ? eq.nombre : 'Equipo desconocido'} · ${eq ? (eq.sector||'') : ''}</div>
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
                        <span class="eqv2-pill ${pillPrio[i.prioridad]||'eqv2-pill-media'}">${i.prioridad||'Media'}</span>
                        <span class="eqv2-pill ${pillEst[i.estado]||'eqv2-pill-abierta'}">${i.estado}</span>
                    </div>
                </div>
                <div class="eqv2-inc-desc">${i.descripcion||'—'}</div>
                ${i.estado === 'Resuelta' && i.resolucion ? `<div class="eqv2-inc-resolucion">Resolución: ${i.resolucion}</div>` : ''}
                <div class="eqv2-inc-footer">
                    <span class="eqv2-inc-fecha">📅 ${i.fecha}</span>
                    ${i.estado !== 'Resuelta' ? `<button class="eqv2-btn-ghost" style="padding:6px 12px;font-size:.78rem" onclick="eqv2ResolverInc(${i.equipoId},${i.id})">✔ Marcar resuelta</button>` : ''}
                    <button class="eqv2-btn-danger" style="padding:6px 12px" onclick="eqv2EliminarInc(${i.equipoId},${i.id})">🗑️</button>
                </div>
            </div>`;
        }).join('');

        actualizarBadgeInc();
    }

    document.getElementById('inc-filtro').addEventListener('change', renderIncidencias);

    window.eqv2ResolverInc = async function(eqId, incId) {
        const resolucion = prompt('Descripción de la resolución (opcional):') || '';
        await fetch(`/api/equipos/${eqId}/incidencias/${incId}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ estado: 'Resuelta', resolucion })
        });
        await cargarIncidencias();
        renderIncidencias();
    };

    window.eqv2EliminarInc = async function(eqId, incId) {
        const ok = await confirmar({
            icono: '🗑️',
            titulo: '¿Eliminar incidencia?',
            detalle: 'Se eliminará este registro de incidencia permanentemente.',
            labelOk: 'Sí, eliminar',
            colorOk: '#ef4444',
            colorOkText: '#fff'
        });
        if (!ok) return;
        await fetch(`/api/equipos/${eqId}/incidencias/${incId}`, { method: 'DELETE' });
        await cargarIncidencias();
        renderIncidencias();
    };

    // ── Modal nueva incidencia ────────────────────────────────────────────

    document.getElementById('eqv2-btn-nueva-inc').onclick = function() {
        const sel = document.getElementById('inc-equipo-sel');
        sel.innerHTML = equiposData.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
        document.getElementById('inc-desc-inp').value = '';
        document.getElementById('eqv2-modal-inc').style.display = 'flex';
    };

    document.getElementById('eqv2-modal-cancelar').onclick = () => {
        document.getElementById('eqv2-modal-inc').style.display = 'none';
    };

    document.getElementById('eqv2-modal-inc').addEventListener('click', e => {
        if (e.target === document.getElementById('eqv2-modal-inc'))
            document.getElementById('eqv2-modal-inc').style.display = 'none';
    });

    document.getElementById('eqv2-modal-guardar').onclick = async function() {
        const equipoId   = parseInt(document.getElementById('inc-equipo-sel').value);
        const tipo       = document.getElementById('inc-tipo-sel').value;
        const prioridad  = document.getElementById('inc-prio-sel').value;
        const descripcion = document.getElementById('inc-desc-inp').value.trim();
        if (!descripcion) { alert('Ingresá una descripción.'); return; }

        const eq = equiposData.find(e => e.id === equipoId);
        const ok = await confirmar({
            icono: '⚠️',
            titulo: '¿Registrar incidencia?',
            detalle: `Se creará una incidencia de tipo <strong>${tipo}</strong> (prioridad ${prioridad}) para <strong>${eq?.nombre||'el equipo'}</strong>.`,
            labelOk: 'Sí, registrar'
        });
        if (!ok) return;

        await fetch(`/api/equipos/${equipoId}/incidencias`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo, prioridad, descripcion })
        });

        document.getElementById('eqv2-modal-inc').style.display = 'none';
        await cargarIncidencias();
        renderIncidencias();
    };

    // ── Función global para alertas del dashboard ─────────────────────────
    // (llamada desde actualizarAlertasDesdeAPI en el panel de alertas)
    window.gestionarEquipo = function(id) { eqv2EditarEquipo(id); };

    // ── Exportar CSV ──────────────────────────────────────────────────────
    // Reutilizamos el botón de exportar si existe
    const btnExp = document.getElementById('eq-btn-exportar');
    if (btnExp) {
        btnExp.onclick = () => {
            const csv = ['Nombre,Categoría,Sector,Estado,Mantenimiento,Responsable,Serie',
                ...equiposData.map(e => `${e.nombre},${e.categoria},${e.sector},${e.estado},${e.mantenimiento},${e.responsable},${e.serie}`)
            ].join('\n');
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
            a.download = 'inventario_equipos.csv';
            a.click();
        };
    }

    // ── Init ──────────────────────────────────────────────────────────────
    async function init() {
        await cargarEquipos();
        await cargarIncidencias();
        renderInventario();
    }

    init();
})();
</script>
