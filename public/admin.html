<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECLON Admin - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary-red: #ff3333;   
            --bg-dark: #0a0a0a;       
            --card-dark: #121212;     
            --text-main: #ffffff;     
            --text-muted: #888888;    
            --status-green: #00ff66;
            --status-gray: #e0e0e0;
            --input-bg: #1a1a1a;
        }

        body { 
            margin: 0; display: flex; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); color: var(--text-main); 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 250px; height: 100vh; 
            background: var(--card-dark); border-right: 1px solid #1a1a1a; 
            position: fixed; display: flex; flex-direction: column; z-index: 1000;
        }
        
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .sidebar-logo { max-width: 180px; height: auto; }

        /* TÍTULO PLATEADO EN SIDEBAR */
        .sidebar-header h1 {
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 15px 0 0 0;
            background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5);
            font-weight: 900;
        }

        .nav-link { 
            padding: 15px 25px; color: var(--text-muted); text-decoration: none; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; 
        }
        .nav-link.active { color: var(--text-main); background: #1a1a1a; border-right: 3px solid var(--primary-red); }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content { margin-left: 250px; flex: 1; padding: 30px; min-height: 100vh; }

        /* TÍTULO PLATEADO PRINCIPAL */
        .main-content h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 10%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.8));
        }

        /* ESTILOS PARA COMPONENTES DE LISTA (Se inyectan desde socios_lista.html) */
        .search-container {
            display: flex; gap: 15px; margin-bottom: 30px; align-items: center;
            background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; border: 1px solid #222;
        }
        .search-wrapper { position: relative; flex: 2; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-red); }
        
        .admin-input { 
            width: 100%; padding: 12px 15px 12px 45px; border-radius: 10px; border: 1px solid #333; 
            background: var(--input-bg); color: var(--text-main); font-size: 0.95rem; transition: 0.3s;
            box-sizing: border-box;
        }
        .admin-input:focus { border-color: var(--primary-red); outline: none; box-shadow: 0 0 15px rgba(255, 51, 51, 0.1); }
        
        .card { background: var(--card-dark); padding: 25px; border-radius: 12px; border: 1px solid #222; }
        .tabla-socios { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .tabla-socios th { padding: 18px; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid #1a1a1a; text-align: center; }
        .tabla-socios td { padding: 18px; text-align: center; border-bottom: 1px solid #1a1a1a; }

        /* PILLS DE ESTADO */
        .status-pill { padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; border: 1px solid transparent; text-transform: uppercase; }
        .status-ok { background: rgba(0, 255, 102, 0.1); color: #00ff66; border-color: #00ff66; }
        .status-vencido { background: rgba(255, 51, 51, 0.1); color: #ff3333; border-color: #ff3333; }
        .status-por-vencer { background: rgba(255, 165, 0, 0.1); color: #ffa500; border-color: #ffa500; }
        .status-suspendido { background: rgba(128, 128, 128, 0.1); color: #e0e0e0; border-color: #e0e0e0; }
        .status-prueba { background: rgba(255, 255, 153, 0.1); color: #ffff99; border-color: #ffff99; }

        /* DROPDOWN GESTIONAR */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .dropbtn:hover { border-color: var(--primary-red); }
        .dropdown-content { display: none; position: absolute; right: 0; background: #1a1a1a; min-width: 170px; border: 1px solid #444; z-index: 9999; border-radius: 8px; box-shadow: 0 10px 30px black; }
        .dropdown-content button { color: white; padding: 12px; width: 100%; border: none; background: none; text-align: left; cursor: pointer; border-bottom: 1px solid #222; }
        .dropdown-content button:hover { background: #222; color: var(--primary-red); }
        .show { display: block !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="img/logo.png" alt="DECLON" class="sidebar-logo">
            <h1>ADMIN</h1>
        </div>
        <nav>
            <div class="nav-link active" onclick="switchTab('socios_lista')"><i class="fas fa-list"></i> Ver Socios</div>
            <div class="nav-link" onclick="switchTab('socios_registro')"><i class="fas fa-user-plus"></i> Registrar Socio</div>
            <div class="nav-link" onclick="switchTab('equipos')"><i class="fas fa-tools"></i> Equipos</div>
            <div class="nav-link" onclick="switchTab('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
        </nav>
    </div>

    <main class="main-content" id="view-container"></main>

    <script>
        let sociosGlobal = [];
        window.socioAEditar = null;

        // --- NAVEGACIÓN ---
       async function switchTab(tabName) {
    const container = document.getElementById('view-container');
    try {
        const response = await fetch(`${tabName}.html`);
        const html = await response.text();
        container.innerHTML = html;

        // Actualizar links activos en el sidebar
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
            if(link.getAttribute('onclick').includes(tabName)) link.classList.add('active');
        });

        // CASO 1: Lista de socios
        if (tabName === 'socios_lista') {
            await cargarSocios(); 
        }
        
        // CASO 2: Registro (Aquí es donde ocurre la magia de la edición)
        if (tabName === 'socios_registro') {
            // Si existe alguien para editar, llenamos los campos
            if (window.socioAEditar) {
                rellenarFormularioEdicion(window.socioAEditar);
            }
        }

    } catch (e) { console.error("Error al cambiar pestaña:", e); }
}

        // --- LÓGICA DE SOCIOS ---
        async function cargarSocios() {
            try {
                const r = await fetch('/api/socios/todos');
                sociosGlobal = await r.json();
                filtrarSocios(); 
            } catch (e) { console.error("Error al cargar socios:", e); }
        }

        function renderizarTabla(lista) {
            const tbody = document.getElementById('lista');
            if(!tbody) return;
            const hoy = new Date();
            hoy.setHours(0,0,0,0);

            tbody.innerHTML = lista.map(s => {
                const desde = new Date(s.fechaInicio || s.fechaPago);
                const hasta = new Date(desde);
                hasta.setDate(desde.getDate() + 30);
                const diffDays = Math.ceil((hasta - hoy) / (1000 * 60 * 60 * 24));
                const diasDesdeReg = Math.floor((hoy - desde) / (1000 * 60 * 60 * 24));

                let estadoTexto = "AL DÍA", estadoClase = "status-ok";
                if (s.estado === "Suspendido") { estadoTexto = "SUSPENDIDO"; estadoClase = "status-suspendido"; }
                else if (s.plan === "Semana de Prueba") {
                    if (diasDesdeReg <= 7) { estadoTexto = "PRUEBA"; estadoClase = "status-prueba"; }
                    else { estadoTexto = "VENCIDO"; estadoClase = "status-vencido"; }
                } else if (hoy > hasta) { estadoTexto = "VENCIDO"; estadoClase = "status-vencido"; }
                else if (diffDays <= 5 && diffDays >= 0) { estadoTexto = "POR VENCER"; estadoClase = "status-por-vencer"; }

                return `
                <tr>
                    <td><b>${s.nombre.toUpperCase()}</b><br><small style="color:var(--text-muted)">${s.dni}</small></td>
                    <td><span style="color:var(--primary-red); font-weight:bold;">${s.plan || 'Musculación'}</span></td>
                    <td><small style="color:var(--text-muted)">Desde: ${desde.toLocaleDateString('es-AR')}</small><br><b>Vence: ${hasta.toLocaleDateString('es-AR')}</b></td>
                    <td><span class="status-pill ${estadoClase}">${estadoTexto}</span></td>
                    <td>
                        <div class="dropdown">
                            <button class="dropbtn" onclick="toggleMenu(event, this)"><i class="fas fa-cog"></i> GESTIONAR</button>
                            <div class="dropdown-content">
                                <button onclick='cobrarMes("${s.dni}")'><i class="fas fa-money-bill-wave"></i> Cobrar Mes</button>
                                <button onclick='prepararEdicion(${JSON.stringify(s)})'><i class="fas fa-edit"></i> Editar Datos</button>
                                <button onclick="borrarSocio('${s.dni}')" style="color: #ff4444;"><i class="fas fa-trash"></i> Eliminar</button>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function filtrarSocios() {
            const inputBusqueda = document.getElementById('busqueda');
            const inputEstado = document.getElementById('filtroEstado');
            const contadorLabel = document.getElementById('contador-socios');

            if (!inputBusqueda || !inputEstado) return;

            const busqueda = inputBusqueda.value.toLowerCase();
            const filtroEstado = inputEstado.value;

            const filtrados = sociosGlobal.filter(s => {
                const coincideTexto = s.nombre.toLowerCase().includes(busqueda) || s.dni.includes(busqueda);
                
                const hoy = new Date(); hoy.setHours(0,0,0,0);
                const desde = new Date(s.fechaInicio || s.fechaPago);
                const hasta = new Date(desde); hasta.setDate(desde.getDate() + 30);
                const diasDesdeReg = Math.floor((hoy - desde) / (1000 * 60 * 60 * 24));
                const diffDays = Math.ceil((hasta - hoy) / (1000 * 60 * 60 * 24));

                let estadoActual = "AL DÍA";
                if (s.estado === "Suspendido") estadoActual = "SUSPENDIDO";
                else if (s.plan === "Semana de Prueba") estadoActual = (diasDesdeReg <= 7) ? "PRUEBA" : "VENCIDO";
                else if (hoy > hasta) estadoActual = "VENCIDO";
                else if (diffDays <= 5 && diffDays >= 0) estadoActual = "POR VENCER";

                return coincideTexto && (filtroEstado === "todos" || estadoActual === filtroEstado);
            });

            renderizarTabla(filtrados);
            if (contadorLabel) contadorLabel.innerText = filtrados.length;
        }

        // --- ACCIONES ---
        async function cobrarMes(dni) {
            if(!confirm("¿Confirmar pago y renovar 30 días?")) return;
            try {
                const res = await fetch('/api/socios/cobrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dni: dni, nuevaFecha: new Date().toISOString() })
                });
                if(res.ok) { alert("Pago registrado"); cargarSocios(); }
            } catch (e) { alert("Error de conexión"); }
        }

        async function borrarSocio(dni) {
            if (!confirm(`¿Eliminar socio DNI: ${dni}?`)) return;
            try {
                const res = await fetch(`/api/socios/${dni}`, { method: 'DELETE' });
                if (res.ok) { alert("Socio eliminado"); cargarSocios(); }
            } catch (e) { alert("Error"); }
        }

        function prepararEdicion(socio) {
            window.socioAEditar = socio; 
            switchTab('socios_registro');
        }

        // --- UTILIDADES ---
        function toggleMenu(event, btn) {
            event.stopPropagation();
            document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
            btn.nextElementSibling.classList.toggle('show');
        }
function rellenarFormularioEdicion(socio) {
    // IMPORTANTE: Asegúrate de que los IDs (nombre, dni, plan, etc) 
    // coincidan con los que pusiste en socios_registro.html
    const campos = {
        'nombre': socio.nombre,
        'dni': socio.dni,
        'telefono': socio.telefono,
        'plan': socio.plan,
        'fechaInicio': socio.fechaInicio ? socio.fechaInicio.split('T')[0] : '' 
    };

    for (let id in campos) {
        const input = document.getElementById(id);
        if (input) {
            input.value = campos[id];
        }
    }

    // Cambiamos el título del formulario para que el usuario sepa que está editando
    const tituloForm = document.querySelector('.card h1');
    if (tituloForm) tituloForm.innerText = "EDITAR SOCIO";

    // Opcional: Bloquear el DNI para que no lo editen (ya que es la llave única)
    const inputDni = document.getElementById('dni');
    if (inputDni) inputDni.readOnly = true;

    // Limpiamos la variable global después de usarla para que el 
    // próximo registro nuevo empiece vacío
    window.socioAEditar = null;
}
        window.onclick = () => document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
        window.onload = () => switchTab('socios_lista');
    </script>
</body>
</html>
