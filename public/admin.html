<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM Admin</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="card">
            <h2><i class="fas fa-user-plus"></i> Registrar Socio</h2>
            <form id="registroForm">
                <input type="text" id="nombre" class="admin-input" placeholder="Nombre Completo" required>
                <input type="text" id="dni" class="admin-input" placeholder="DNI" required>
                <input type="date" id="nacimiento" class="admin-input" required>
                <input type="text" id="direccion" class="admin-input" placeholder="Dirección">
                <input type="tel" id="telefono" class="admin-input" placeholder="Teléfono">
                <button type="submit" id="btn" class="btn-admin">DAR DE ALTA</button>
            </form>
        </div>

        <div class="card">
            <h2><i class="fas fa-users"></i> Lista de Clientes</h2>
            <div style="overflow-x: auto;">
                <table class="tabla-socios">
                    <thead>
                        <tr><th>Nombre</th><th>DNI</th><th>Teléfono</th><th>Acciones</th></tr>
                    </thead>
                    <tbody id="lista"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const actualizarLista = async () => {
            const body = document.getElementById('lista');
            body.innerHTML = '<tr><td colspan="4">Cargando...</td></tr>';
            try {
                const r = await fetch('/api/socios/todos');
                if(!r.ok) throw new Error();
                const data = await r.json();
                
                if(data.length === 0) {
                    body.innerHTML = '<tr><td colspan="4">No hay socios.</td></tr>';
                    return;
                }

                body.innerHTML = data.map(s => `
                    <tr>
                        <td>${s.nombre}</td>
                        <td>${s.dni}</td>
                        <td>${s.telefono || '-'}</td>
                        <td><button onclick="borrar('${s.dni}')" style="color:red; background:none; border:none; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `).join('');
            } catch (e) {
                body.innerHTML = '<tr><td colspan="4" style="color:red;">Error de conexión con Redis.</td></tr>';
            }
        };

        const borrar = async (dni) => {
            if(confirm('¿Eliminar?')) {
                await fetch(`/api/socios/${dni}`, { method: 'DELETE' });
                actualizarLista();
            }
        };

        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true;
            
            const payload = {
                nombre: document.getElementById('nombre').value,
                dni: document.getElementById('dni').value,
                nacimiento: document.getElementById('nacimiento').value,
                direccion: document.getElementById('direccion').value,
                telefono: document.getElementById('telefono').value
            };

            await fetch('/api/registrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            e.target.reset();
            btn.disabled = false;
            actualizarLista();
        };

        window.onload = actualizarLista;
    </script>
</body>
</html>
