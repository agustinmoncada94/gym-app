<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DECLON Admin - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="admin.css" />
</head>
<body>
    <div class="admin-shell">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-wrap">
                    <img src="img/logo.png" alt="DECLON" class="sidebar-logo" />
                </div>
                <div>
                    <p class="sidebar-kicker">Panel administrativo</p>
                    <h1>DECLON ADMIN</h1>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-link active" onclick="switchTab('socios_lista')">
                    <i class="fas fa-list"></i>
                    <span>Ver Socios</span>
                </button>

                <button class="nav-link" onclick="switchTab('socios_registro')">
                    <i class="fas fa-user-plus"></i>
                    <span>Registrar Socio</span>
                </button>

                <button class="nav-link" onclick="switchTab('equipos')">
                    <i class="fas fa-dumbbell"></i>
                    <span>Equipamiento</span>
                </button>

                <button class="nav-link" onclick="switchTab('dashboard')">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard KPI</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-box">
                    <span class="status-dot"></span>
                    <span>Sistema activo</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <p class="topbar-kicker">Gestión integral del gimnasio</p>
                    <h2>Panel de Control</h2>
                </div>
                <div class="topbar-actions">
                    <button class="ghost-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                    <button class="ghost-btn">
                        <i class="fas fa-user-shield"></i>
                    </button>
                </div>
            </header>

            <section class="hero-card">
                <div>
                    <p class="hero-label">Resumen</p>
                    <h3>Administrá socios, pagos, equipos y métricas desde un solo lugar</h3>
                    <p class="hero-text">
                        Un entorno más moderno, claro y profesional para operar el gimnasio con rapidez.
                    </p>
                </div>
                <div class="hero-badge">
                    <i class="fas fa-fire"></i>
                    <span>Modo Admin</span>
                </div>
            </section>

            <section id="view-container"></section>
        </main>
    </div>

    <script>
        let sociosGlobal = [];
        window.socioAEditar = null;
        window.modoEdicion = false;
        window.dniEditando = null;

        async function switchTab(tabName) {
            const container = document.getElementById('view-container');
            try {
                const response = await fetch(`${tabName}.html`);
                const html = await response.text();
                container.innerHTML = html;

                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('onclick').includes(tabName)) {
                        link.classList.add('active');
                    }
                });

                if (tabName === 'socios_lista') await cargarSocios();

                if (tabName === 'socios_registro') {
                    if (window.socioAEditar) {
                        rellenarFormularioEdicion(window.socioAEditar);
                    } else {
                        window.modoEdicion = false;
                        window.dniEditando = null;
                    }

                    const form = document.getElementById('registroForm');
                    if (form) {
                        form.addEventListener('submit', async function (e) {
                            e.preventDefault();
                            const datos = {
                                nombre: document.getElementById('nombre').value.trim(),
                                dni: document.getElementById('dni').value.trim(),
                                nacimiento: document.getElementById('nacimiento').value,
                                telefono: document.getElementById('telefono').value.trim(),
                                plan: document.getElementById('plan').value,
                                estado: document.getElementById('estado').value,
                                fechaInicio: document.getElementById('fechaInicio').value || new Date().toISOString()
                            };

                            try {
                                let res;
                                if (window.modoEdicion && window.dniEditando) {
                                    res = await fetch(`/api/socios/${window.dniEditando}`, {
                                        method: 'PUT',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify(datos)
                                    });
                                } else {
                                    res = await fetch('/api/registrar', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify(datos)
                                    });
                                }

                                const resultado = await res.json();
                                if (resultado.success) {
                                    window.modoEdicion = false;
                                    window.dniEditando = null;
                                    alert(window.modoEdicion ? 'Socio actualizado correctamente.' : 'Socio guardado correctamente.');
                                    switchTab('socios_lista');
                                } else {
                                    alert('Error al guardar: ' + (resultado.error || 'desconocido'));
                                }
                            } catch (err) {
                                alert('Error de conexión: ' + err.message);
                            }
                        });
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function cargarSocios() {
            try {
                const r = await fetch('/api/socios/todos');
                sociosGlobal = await r.json();
                filtrarSocios();
            } catch (e) {
                console.error(e);
            }
        }

        function rellenarFormularioEdicion(socio) {
            const initialDate = socio.fechaInicio || socio.fechaPago;
            const formattedInitialDate = initialDate ? initialDate.split('T')[0] : '';

            const campos = {
                nombre: socio.nombre,
                dni: socio.dni,
                telefono: socio.telefono,
                plan: socio.plan,
                nacimiento: socio.nacimiento ? socio.nacimiento.split('T')[0] : '',
                estado: socio.estado,
                fechaInicio: formattedInitialDate
            };

            for (let id in campos) {
                const input = document.getElementById(id);
                if (input) input.value = campos[id];
            }

            const inputDni = document.getElementById('dni');
            if (inputDni) inputDni.readOnly = false;

            const tituloForm = document.querySelector('.card h1');
            if (tituloForm) tituloForm.innerText = "EDITAR SOCIO";

            const btnAlta = document.querySelector('button[type="submit"]') || document.querySelector('.btn-submit');
            if (btnAlta) {
                btnAlta.innerText = "TERMINAR EDICIÓN";
                btnAlta.classList.add('btn-edit-mode');
            }

            window.modoEdicion = true;
            window.dniEditando = socio.dni;
            window.socioAEditar = null;
        }

        function renderizarTabla(lista) {
            const tbody = document.getElementById('lista');
            if (!tbody) return;

            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            tbody.innerHTML = lista.map(s => {
                const desde = new Date(s.fechaInicio || s.fechaPago);
                const hasta = new Date(desde);
                hasta.setDate(desde.getDate() + 30);

                const diffDays = Math.ceil((hasta - hoy) / (1000 * 60 * 60 * 24));
                const diasDesdeReg = Math.floor((hoy - desde) / (1000 * 60 * 60 * 24));

                let estadoTexto = "AL DÍA", estadoClase = "status-ok";

                if (s.estado === "Suspendido") {
                    estadoTexto = "SUSPENDIDO";
                    estadoClase = "status-suspendido";
                } else if (s.plan === "Semana de Prueba") {
                    if (diasDesdeReg <= 7) {
                        estadoTexto = "PRUEBA";
                        estadoClase = "status-prueba";
                    } else {
                        estadoTexto = "VENCIDO";
                        estadoClase = "status-vencido";
                    }
                } else if (hoy > hasta) {
                    estadoTexto = "VENCIDO";
                    estadoClase = "status-vencido";
                } else if (diffDays <= 5 && diffDays >= 0) {
                    estadoTexto = "POR VENCER";
                    estadoClase = "status-por-vencer";
                }

                return `
                <tr>
                    <td class="td-socio">
                        <b class="nombre-socio">${s.nombre.toUpperCase()}</b>
                        <small class="dni-socio">${s.dni}</small>
                    </td>
                    <td>
                        <span class="plan-pill">${s.plan || 'Musculación'}</span>
                    </td>
                    <td>
                        <small class="fecha-desde">Desde: ${desde.toLocaleDateString('es-AR')}</small>
                        <b class="fecha-hasta">Vence: ${hasta.toLocaleDateString('es-AR')}</b>
                    </td>
                    <td>
                        <span class="status-pill ${estadoClase}">${estadoTexto}</span>
                    </td>
                    <td>
                        <div class="dropdown">
                            <button class="dropbtn" onclick="toggleMenu(event, this)">
                                <i class="fas fa-cog"></i> Gestionar
                            </button>
                            <div class="dropdown-content">
                                <button onclick='cobrarMes("${s.dni}")'>
                                    <i class="fas fa-money-bill-wave"></i> Cobrar Mes
                                </button>
                                <button onclick='prepararEdicion(${JSON.stringify(s)})'>
                                    <i class="fas fa-edit"></i> Editar Datos
                                </button>
                                <button onclick="borrarSocio('${s.dni}')" class="danger-action">
                                    <i class="fas fa-trash"></i> Eliminar
                                </button>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function filtrarSocios() {
            const inputBusqueda = document.getElementById('busqueda');
            const contadorLabel = document.getElementById('contador-socios');
            if (!inputBusqueda) return;

            const busqueda = inputBusqueda.value.toLowerCase();
            const filtrados = sociosGlobal.filter(
                s => s.nombre.toLowerCase().includes(busqueda) || s.dni.includes(busqueda)
            );

            renderizarTabla(filtrados);
            if (contadorLabel) contadorLabel.innerText = filtrados.length;
        }

        async function cobrarMes(dni) {
            if (!confirm('¿Confirmar cobro del mes para este socio?')) return;

            const nuevaFecha = new Date().toISOString();

            try {
                const res = await fetch('/api/socios/cobrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dni, nuevaFecha })
                });
                const resultado = await res.json();
                if (resultado.success) {
                    await cargarSocios();
                } else {
                    alert('Error al cobrar: ' + (resultado.mensaje || resultado.error || 'desconocido'));
                }
            } catch (err) {
                alert('Error de conexión: ' + err.message);
            }
        }

        function prepararEdicion(socio) {
            window.socioAEditar = socio;
            switchTab('socios_registro');
        }

        function toggleMenu(event, btn) {
            event.stopPropagation();
            document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
            btn.nextElementSibling.classList.toggle('show');
        }

        window.onclick = () => {
            document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
        };

        window.onload = () => switchTab('socios_lista');
    </script>
</body>
</html>
