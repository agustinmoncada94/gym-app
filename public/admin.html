<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - GYM Admin</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="admin-layout">
        
        <div class="card">
            <h2><i class="fas fa-user-plus"></i> Registrar Socio</h2>
            <form id="registroForm">
                <input type="text" id="nombre" class="admin-input" placeholder="Nombre Completo" required>
                <input type="tel" id="dni" class="admin-input" placeholder="DNI (sin puntos)" required inputmode="numeric">
                
                <label style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-left: 5px;">Fecha de Nacimiento</label>
                <input type="date" id="nacimiento" class="admin-input" required>
                
                <input type="text" id="direccion" class="admin-input" placeholder="Dirección">
                <input type="tel" id="telefono" class="admin-input" placeholder="Teléfono">
                
                <button type="submit" id="btnEnviar" class="btn-admin">DAR DE ALTA</button>
            </form>
            <div id="resultado" class="mensaje"></div>
        </div>

        <div class="card">
            <h2><i class="fas fa-users"></i> Lista de Clientes</h2>
            <div style="overflow-x: auto;">
                <table class="tabla-socios">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaSocios">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 1. FUNCIÓN PARA CARGAR LOS SOCIOS DESDE REDIS
        async function cargarSocios() {
            const lista = document.getElementById('listaSocios');
            lista.innerHTML = '<tr><td colspan="4" style="text-align:center;">Cargando socios...</td></tr>';

            try {
                const respuesta = await fetch('/api/socios/todos');
                const socios = await respuesta.json();

                if (socios.length === 0) {
                    lista.innerHTML = '<tr><td colspan="4" style="text-align:center; color:gray;">No hay socios registrados aún.</td></tr>';
                    return;
                }

                lista.innerHTML = ''; // Limpiamos la tabla
                socios.forEach(socio => {
                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td>${socio.nombre}</td>
                        <td>${socio.dni}</td>
                        <td><span class="status-badge active">ACTIVO</span></td>
                        <td>
                            <button title="Eliminar" style="background:none; border:none; color:#e57373; cursor:pointer;" onclick="eliminarSocio('${socio.dni}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    `;
                    lista.appendChild(fila);
                });
            } catch (error) {
                console.error(error);
                lista.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Error al conectar con el servidor.</td></tr>';
            }
        }

        // 2. FUNCIÓN PARA ELIMINAR UN SOCIO
        async function eliminarSocio(dni) {
            if (!confirm(`¿Estás seguro de que querés eliminar al socio con DNI ${dni}?`)) return;

            try {
                const response = await fetch(`/api/socios/${dni}`, { method: 'DELETE' });
                if (response.ok) {
                    cargarSocios(); // Recargamos la lista
                } else {
                    alert("No se pudo eliminar al socio.");
                }
            } catch (error) {
                alert("Error de red al intentar eliminar.");
            }
        }

        // 3. FUNCIÓN PARA EL REGISTRO
        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "REGISTRANDO...";

            const datos = {
                nombre: document.getElementById('nombre').value,
                dni: document.getElementById('dni').value,
                nacimiento: document.getElementById('nacimiento').value,
                direccion: document.getElementById('direccion').value,
                telefono: document.getElementById('telefono').value
            };

            try {
                const response = await fetch('/api/registrar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });

                if (response.ok) {
                    alert("¡Socio registrado!");
                    e.target.reset();
                    cargarSocios(); // <--- RECARGA LA LISTA AL INSTANTE
                } else {
                    const err = await response.json();
                    alert("Error: " + err.error);
                }
            } catch (error) {
                alert("Error de conexión.");
            } finally {
                btn.disabled = false;
                btn.innerText = "DAR DE ALTA";
            }
        };

        // AL CARGAR LA PÁGINA, PEDIMOS LOS DATOS
        window.onload = cargarSocios;
    </script>
</body>
</html>
