<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - GYM</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="card">
            <h2><i class="fas fa-user-plus"></i> Registrar Socio</h2>
            <form id="registroForm">
                <input type="text" id="nombre" class="admin-input" placeholder="Nombre Completo" required>
                <input type="text" id="dni" class="admin-input" placeholder="DNI (sin puntos)" required>
                <label style="color:#aaa; font-size:0.8rem; margin:10px 0 5px 5px; display:block;">Fecha de Nacimiento</label>
                <input type="date" id="nacimiento" class="admin-input" required>
                <input type="text" id="direccion" class="admin-input" placeholder="Dirección Residencial">
                <input type="tel" id="telefono" class="admin-input" placeholder="Teléfono de Contacto">
                <button type="submit" id="btnGuardar" class="btn-admin">DAR DE ALTA</button>
            </form>
        </div>

        <div class="card">
            <h2><i class="fas fa-users"></i> Lista de Clientes</h2>
            <div style="overflow-x: auto;">
                <table class="tabla-socios">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaCuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const renderizarLista = async () => {
            const tabla = document.getElementById('listaCuerpo');
            tabla.innerHTML = '<tr><td colspan="4">Cargando socios...</td></tr>';
            
            try {
                const respuesta = await fetch('/api/socios/todos');
                if (!respuesta.ok) throw new Error();
                const socios = await respuesta.json();

                if (socios.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="4">No hay socios registrados aún.</td></tr>';
                    return;
                }

                tabla.innerHTML = socios.map(s => `
                    <tr>
                        <td><strong>${s.nombre}</strong></td>
                        <td>${s.dni}</td>
                        <td>${s.telefono || 'No cargado'}</td>
                        <td>
                            <button onclick="eliminarSocio('${s.dni}')" style="color:#ff4d4d; background:none; border:none; cursor:pointer; font-size:1.2rem;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tabla.innerHTML = '<tr><td colspan="4" style="color:#ff4d4d;">Error al conectar con la base de datos.</td></tr>';
            }
        };

        const eliminarSocio = async (dni) => {
            if (!confirm('¿Seguro que desea eliminar a este socio?')) return;
            await fetch(`/api/socios/${dni}`, { method: 'DELETE' });
            renderizarLista();
        };

        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardar');
            btn.disabled = true;
            btn.innerText = "GUARDANDO...";

            const nuevoSocio = {
                nombre: document.getElementById('nombre').value,
                dni: document.getElementById('dni').value,
                nacimiento: document.getElementById('nacimiento').value,
                direccion: document.getElementById('direccion').value,
                telefono: document.getElementById('telefono').value
            };

            try {
                const res = await fetch('/api/registrar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(nuevoSocio)
                });
                if (res.ok) {
                    e.target.reset();
                    renderizarLista();
                }
            } catch (err) {
                alert("Error de conexión al registrar.");
            } finally {
                btn.disabled = false;
                btn.innerText = "DAR DE ALTA";
            }
        };

        window.onload = renderizarLista;
    </script>
</body>
</html>
