<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECLON Admin - Panel de Control</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary-red: #ff3333;   /* Rojo neón DECLON */
            --border-red: #cc0000;    /* Rojo sutil */
            --bg-dark: #0a0a0a;       
            --card-dark: #121212;     
            --text-main: #ffffff;     
            --text-muted: #888888;    
        }

        body { 
            margin: 0; 
            display: flex; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
        }

        /* SIDEBAR */
        .sidebar { 
            width: 250px; 
            height: 100vh; 
            background: var(--card-dark); 
            border-right: 1px solid #1a1a1a; 
            position: fixed; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000; /* Corregido de z-content */
        }

        .sidebar-header { 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 1px solid #1a1a1a; 
        }

        .sidebar-logo {
            max-width: 180px; 
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .nav-link { 
            padding: 15px 25px; 
            color: var(--text-muted); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            border-right: 3px solid transparent;
        }

        .nav-link i { color: #555; transition: 0.3s; }
        .nav-link:hover { background: #1a1a1a; color: var(--text-main); }
        .nav-link.active { 
            color: var(--text-main); 
            background: #1a1a1a; 
            border-right-color: var(--primary-red); 
        }
        .nav-link.active i { color: var(--primary-red); }

        /* CONTENIDO */
        .main-content { margin-left: 250px; flex: 1; padding: 30px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* COMPONENTES */
        .admin-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { 
            background: var(--card-dark); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid var(--border-red); 
            margin-bottom: 20px;
        }

        .card h2 { margin-top: 0; color: var(--text-main); font-size: 1.2rem; }

        .admin-input, .admin-select { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: 1px solid #333; background: #080808; color: var(--text-main); 
            box-sizing: border-box; transition: 0.3s;
        }

        .admin-input:focus { border-color: var(--primary-red); outline: none; }

        .btn-admin { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: var(--primary-red); color: #fff; font-weight: bold; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        .btn-admin:hover { background: #cc0000; }

        /* TABLA */
        .tabla-socios { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .tabla-socios th, .tabla-socios td { text-align: left; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .tabla-socios th { color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; }

        .search-input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: #080808; color: var(--text-main); box-sizing: border-box; 
        }

        /* ESTADOS */
        .status-pill { padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
        .status-ok { background: rgba(204, 0, 0, 0.1); color: var(--primary-red); border: 1px solid var(--border-red); }
        .status-vencido { background: rgba(255, 255, 255, 0.05); color: #888; border: 1px solid #444; }

        .btn-pay, .btn-edit, .btn-borrar { background: none; border: none; cursor: pointer; color: #fff; margin-right: 10px; transition: 0.2s; }
        .btn-pay:hover, .btn-edit:hover, .btn-borrar:hover { color: var(--primary-red); transform: scale(1.1); }

        /* DASHBOARD ESPECÍFICO */
        .db-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .db-card { background: #080808; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="img/logo.png" alt="DECLON Logo" class="sidebar-logo">
        </div>
        <div class="nav-link active" onclick="switchTab('tab-socios')"><i class="fas fa-users"></i> Socios</div>
        <div class="nav-link" onclick="switchTab('tab-equipos')"><i class="fas fa-tools"></i> Equipos</div>
        <div class="nav-link" onclick="switchTab('tab-dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
    </div>

    <div class="main-content">
        
        <div id="tab-socios" class="tab-content active">
            <div class="admin-layout">
                <div class="card">
                    <h2 id="formTitle"><i class="fas fa-user-plus"></i> Registrar Socio</h2>
                    <form id="registroForm">
                        <input type="hidden" id="editMode" value="false">
                        <label style="font-size: 0.75rem; color: #888;">NOMBRE COMPLETO</label>
                        <input type="text" id="nombre" class="admin-input" placeholder="Ej: Juan Pérez" required>
                        <label style="font-size: 0.75rem; color: #888;">DNI</label>
                        <input type="text" id="dni" class="admin-input" placeholder="Sin puntos" required>
                        <label style="font-size: 0.75rem; color: #888;">FECHA NACIMIENTO</label>
                        <input type="date" id="nacimiento" class="admin-input" required>
                        <label style="font-size: 0.75rem; color: #888;">TELÉFONO</label>
                        <input type="tel" id="telefono" class="admin-input" placeholder="353...">
                        <label style="font-size: 0.75rem; color: #888;">PLAN</label>
                        <select id="plan" class="admin-input">
                            <option value="Musculación">Musculación</option>
                            <option value="Plan Full">Plan Full</option>
                            <option value="Personalizado">Personalizado</option>
                            <option value="Familiar">Familiar</option>
                        </select>
                        <label style="font-size: 0.75rem; color: #888;">INICIO COBERTURA</label>
                        <input type="date" id="fechaInicioManual" class="admin-input">
                        <button type="submit" id="btnSubmit" class="btn-admin">DAR DE ALTA</button>
                        <button type="button" id="btnCancelar" class="btn-admin" style="display:none; background:#444; margin-top:10px;" onclick="cancelarEdicion()">CANCELAR</button>
                    </form>
                </div>
                <div class="card">
                    <h2><i class="fas fa-list"></i> Lista de Socios</h2>
                    <input type="text" id="busqueda" class="search-input" placeholder="Buscar por nombre o DNI..." onkeyup="filtrarSocios()">
                    <div style="overflow-x: auto;">
                        <table class="tabla-socios">
                            <thead>
                                <tr>
                                    <th>Socio</th>
                                    <th>Plan</th>
                                    <th>Vencimiento</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-equipos" class="tab-content">
            <div class="card">
                <h2><i class="fas fa-tools"></i> Gestión de Equipos DECLON</h2>
                <p style="color: #888;">Módulo de inventario en desarrollo.</p>
            </div>
        </div>

        <div id="tab-dashboard" class="tab-content">
            <div class="card">
                <h2><i class="fas fa-chart-line"></i> Dashboard DECLON</h2>
                <div class="db-grid">
                    <div class="db-card">
                        <h3 style="margin:0; color:var(--text-main)" id="totalSocios">0</h3>
                        <p style="font-size: 0.7rem; color:var(--text-muted); margin-top:5px;">SOCIOS TOTALES</p>
                    </div>
                    <div class="db-card">
                        <h3 style="margin:0; color:var(--primary-red)" id="totalVencidos">0</h3>
                        <p style="font-size: 0.7rem; color:var(--text-muted); margin-top:5px;">VENCIDOS</p>
                    </div>
                    <div class="db-card">
                        <h3 style="margin:0; color:#fff" id="totalActivos">0</h3>
                        <p style="font-size: 0.7rem; color:var(--text-muted); margin-top:5px;">AL DÍA</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let sociosGlobal = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            const activeLink = document.querySelector(`.nav-link[onclick="switchTab('${tabId}')"]`);
            if (activeLink) activeLink.classList.add('active');
        }

        async function cargarSocios() {
            try {
                const r = await fetch('/api/socios/todos');
                sociosGlobal = await r.json();
                renderizarTabla(sociosGlobal);
                actualizarDashboard();
            } catch (error) {
                console.error("Error cargando socios:", error);
            }
        }

        function actualizarDashboard() {
            const hoy = new Date();
            let vencidos = 0;
            sociosGlobal.forEach(s => {
                const f = new Date(s.fechaInicio || s.fechaPago);
                if (!isNaN(f.getTime())) {
                    f.setDate(f.getDate() + 30);
                    if (hoy > f) vencidos++;
                }
            });
            document.getElementById('totalSocios').innerText = sociosGlobal.length;
            document.getElementById('totalVencidos').innerText = vencidos;
            document.getElementById('totalActivos').innerText = sociosGlobal.length - vencidos;
        }

        function obtenerFechas(fechaIso) {
            let base = new Date(fechaIso);
            if (isNaN(base.getTime())) base = new Date();
            const hasta = new Date(base);
            hasta.setDate(base.getDate() + 30);
            return { hasta };
        }

        function renderizarTabla(lista) {
            const tabla = document.getElementById('lista');
            const hoy = new Date();
            tabla.innerHTML = lista.map(s => {
                const ciclo = obtenerFechas(s.fechaInicio || s.fechaPago);
                const esVencido = hoy > ciclo.hasta;
                return `
                <tr>
                    <td><b>${s.nombre.toUpperCase()}</b><br><small style="color:#888">${s.dni}</small></td>
                    <td><span style="color:var(--primary-red); font-size:0.8rem;">${s.plan || 'Musculación'}</span></td>
                    <td><small>Vence: ${ciclo.hasta.toLocaleDateString('es-AR')}</small></td>
                    <td><span class="status-pill ${esVencido ? 'status-vencido' : 'status-ok'}">${esVencido ? 'VENCIDO' : 'AL DÍA'}</span></td>
                    <td>
                        <button onclick='renovarMes(${JSON.stringify(s)})' class="btn-pay"><i class="fas fa-money-bill-wave"></i></button>
                        <button onclick='prepararEdicion(${JSON.stringify(s)})' class="btn-edit"><i class="fas fa-edit"></i></button>
                        <button onclick="borrarSocio('${s.dni}')" class="btn-borrar"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function renovarMes(socio) {
            const ciclo = obtenerFechas(socio.fechaInicio || socio.fechaPago);
            let nuevaFecha = (new Date() > ciclo.hasta) ? new Date().toISOString() : ciclo.hasta.toISOString();
            if (confirm(`¿Registrar pago para ${socio.nombre}?`)) {
                socio.fechaInicio = nuevaFecha;
                await fetch(`/api/socios/${socio.dni}`, { 
                    method: 'PUT', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(socio) 
                });
                cargarSocios();
            }
        }

        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            const esEdicion = document.getElementById('editMode').value === "true";
            const dni = document.getElementById('dni').value;
            const fManual = document.getElementById('fechaInicioManual').value;
            document.getElementById('btnSubmit').disabled = true;

            const datos = {
                nombre: document.getElementById('nombre').value,
                dni: dni,
                nacimiento: document.getElementById('nacimiento').value,
                telefono: document.getElementById('telefono').value,
                plan: document.getElementById('plan').value,
                fechaInicio: fManual ? new Date(fManual).toISOString() : (esEdicion ? sociosGlobal.find(s=>s.dni==dni).fechaInicio : new Date().toISOString())
            };

            const url = esEdicion ? `/api/socios/${dni}` : '/api/registrar';
            try {
                await fetch(url, { 
                    method: esEdicion ? 'PUT' : 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(datos) 
                });
                cancelarEdicion();
                cargarSocios();
            } finally {
                document.getElementById('btnSubmit').disabled = false;
            }
        };

        function prepararEdicion(s) {
            document.getElementById('editMode').value = "true";
            document.getElementById('formTitle').innerText = "Editar Socio";
            document.getElementById('nombre').value = s.nombre;
            document.getElementById('dni').value = s.dni;
            document.getElementById('dni').readOnly = true;
            document.getElementById('nacimiento').value = s.nacimiento;
            document.getElementById('telefono').value = s.telefono || '';
            document.getElementById('plan').value = s.plan || 'Musculación';
            document.getElementById('btnSubmit').innerText = "GUARDAR CAMBIOS";
            document.getElementById('btnCancelar').style.display = "block";
        }

        function cancelarEdicion() {
            document.getElementById('registroForm').reset();
            document.getElementById('editMode').value = "false";
            document.getElementById('dni').readOnly = false;
            document.getElementById('btnSubmit').innerText = "DAR DE ALTA";
            document.getElementById('btnCancelar').style.display = "none";
            document.getElementById('formTitle').innerText = "Registrar Socio";
        }

        function filtrarSocios() {
            const t = document.getElementById('busqueda').value.toLowerCase();
            renderizarTabla(sociosGlobal.filter(s => s.nombre.toLowerCase().includes(t) || s.dni.includes(t)));
        }

        async function borrarSocio(dni) {
            if (confirm('¿Eliminar socio?')) {
                await fetch(`/api/socios/${dni}`, { method: 'DELETE' });
                cargarSocios();
            }
        }

        window.onload = cargarSocios;
    </script>
</body>
</html>
