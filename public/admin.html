<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - GYM</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="card">
            <h2>Registrar Socio</h2>
            <form id="registroForm">
                <input type="text" id="nombre" class="admin-input" placeholder="Nombre" required>
                <input type="text" id="dni" class="admin-input" placeholder="DNI" required>
                <input type="date" id="nacimiento" class="admin-input" required>
                <button type="submit" id="btn" class="btn-admin">DAR DE ALTA</button>
            </form>
        </div>

        <div class="card">
            <h2>Lista de Clientes</h2>
            <table class="tabla-socios">
                <thead>
                    <tr><th>Nombre</th><th>DNI</th><th>Acciones</th></tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>

    <script>
        const cargar = async () => {
            const t = document.getElementById('lista');
            t.innerHTML = 'Cargando...';
            try {
                const r = await fetch('/api/socios/todos');
                const data = await r.json();
                t.innerHTML = data.map(s => `
                    <tr>
                        <td>${s.nombre}</td>
                        <td>${s.dni}</td>
                        <td><button onclick="borrar('${s.dni}')" style="color:red; background:none; border:none; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `).join('') || 'No hay socios';
            } catch (e) { t.innerHTML = 'Error al cargar datos.'; }
        };

        const borrar = async (dni) => {
            if(confirm('¿Borrar?')) {
                await fetch(`/api/socios/${dni}`, { method: 'DELETE' });
                cargar();
            }
        };

        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            const datos = {
                nombre: document.getElementById('nombre').value,
                dni: document.getElementById('dni').value,
                nacimiento: document.getElementById('nacimiento').value
            };
            await fetch('/api/registrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            e.target.reset();
            cargar();
        };

        window.onload = cargar;
    </script>
</body>
</html>
