<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECLON Admin - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary-red: #ff3333;   
            --bg-dark: #0a0a0a;       
            --card-dark: #121212;     
            --text-main: #ffffff;     
            --text-muted: #888888;    
            --status-green: #00ff66;
            --status-gray: #e0e0e0;
        }

        body { 
            margin: 0; display: flex; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); color: var(--text-main); 
        }

        /* SIDEBAR */
        .sidebar { 
            width: 250px; height: 100vh; 
            background: var(--card-dark); border-right: 1px solid #1a1a1a; 
            position: fixed; display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .sidebar-logo { max-width: 180px; height: auto; }

        .nav-link { 
            padding: 15px 25px; color: var(--text-muted); text-decoration: none; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; 
        }
        .nav-link.active { color: var(--text-main); background: #1a1a1a; border-right: 3px solid var(--primary-red); }

        .main-content { margin-left: 250px; flex: 1; padding: 30px; min-height: 100vh; }

        /* TABLA Y DISEÑO */
        .card { background: var(--card-dark); padding: 25px; border-radius: 12px; border: 1px solid #222; position: relative; }
        
        .tabla-socios { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        
        .tabla-socios th, .tabla-socios td { 
            padding: 18px; 
            text-align: left; 
            border-bottom: 1px solid #1a1a1a; 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            overflow: visible; /* IMPORTANTE: Para que el menú no se corte */
        }
        .tabla-socios th:last-child, .tabla-socios td:last-child { border-right: none; width: 80px; }

        .status-pill { padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .status-ok { background: rgba(0, 255, 102, 0.1); color: var(--status-green); border: 1px solid var(--status-green); }
        .status-vencido { background: rgba(255, 255, 255, 0.05); color: var(--status-gray); border: 1px solid #444; }

        /* INPUTS */
        .admin-input { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: 1px solid #333; background: #080808; color: var(--text-main); color-scheme: dark; 
        }
        .btn-admin { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary-red); color: #fff; font-weight: bold; cursor: pointer; }

        /* DROPDOWN FLOTANTE (Punto 2: Sin scroll) */
        .dropdown { position: relative; }
        .dropbtn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; padding: 5px; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 30px; background: #1a1a1a;
            min-width: 140px; border: 1px solid #444; z-index: 9999; border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .dropdown-content button { color: white; padding: 12px; width: 100%; border: none; background: none; text-align: left; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid #222; }
        .dropdown-content button:last-child { border-bottom: none; }
        .dropdown-content button:hover { background: #252525; color: var(--primary-red); }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="img/logo.png" alt="DECLON" class="sidebar-logo">
        </div>
        <nav>
            <div class="nav-link active" onclick="switchTab('socios_lista')"><i class="fas fa-list"></i> Ver Socios</div>
            <div class="nav-link" onclick="switchTab('socios_registro')"><i class="fas fa-user-plus"></i> Registrar Socio</div>
            <div class="nav-link" onclick="switchTab('equipos')"><i class="fas fa-tools"></i> Equipos</div>
            <div class="nav-link" onclick="switchTab('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
        </nav>
    </div>

    <main class="main-content" id="view-container"></main>

    <script>
        let sociosGlobal = [];

        async function switchTab(tabName) {
            const container = document.getElementById('view-container');
            try {
                const response = await fetch(`${tabName}.html`);
                const html = await response.text();
                container.innerHTML = html;

                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                    if(link.getAttribute('onclick').includes(tabName)) link.classList.add('active');
                });

                if (tabName === 'socios_lista') cargarSocios();
                if (tabName === 'socios_registro') adjuntarEventoRegistro();
            } catch (e) { console.error(e); }
        }

        async function cargarSocios() {
            try {
                const r = await fetch('/api/socios/todos');
                sociosGlobal = await r.json();
                renderizarTabla(sociosGlobal);
            } catch (e) { console.error(e); }
        }

        // Buscador (Punto 1)
        function filtrarSocios() {
            const busqueda = document.getElementById('busqueda').value.toLowerCase();
            const filtrados = sociosGlobal.filter(s => 
                s.nombre.toLowerCase().includes(busqueda) || 
                s.dni.includes(busqueda)
            );
            renderizarTabla(filtrados);
        }

        function renderizarTabla(lista) {
            const tbody = document.getElementById('lista');
            if(!tbody) return;
            const hoy = new Date();

            tbody.innerHTML = lista.map(s => {
                const desde = new Date(s.fechaInicio || s.fechaPago);
                const hasta = new Date(desde);
                hasta.setDate(desde.getDate() + 30);
                const esVencido = hoy > hasta;

                return `
                <tr>
                    <td><b>${s.nombre.toUpperCase()}</b><br><small style="color:var(--text-muted)">${s.dni}</small></td>
                    <td><span style="color:var(--primary-red); font-weight:bold;">${s.plan || 'MUSCULACIÓN'}</span></td>
                    <td>
                        <small style="color:var(--text-muted)">Desde: ${desde.toLocaleDateString('es-AR')}</small><br>
                        <b>Vence: ${hasta.toLocaleDateString('es-AR')}</b>
                    </td>
                    <td><span class="status-pill ${esVencido ? 'status-vencido' : 'status-ok'}">${esVencido ? 'VENCIDO' : 'AL DÍA'}</span></td>
                    <td>
                        <div class="dropdown">
                            <button class="dropbtn"><i class="fas fa-ellipsis-v"></i></button>
                            <div class="dropdown-content">
                                <button onclick='renovarMes(${JSON.stringify(s)})'><i class="fas fa-money-bill-wave"></i> Cobrar</button>
                                <button onclick='prepararEdicion(${JSON.stringify(s)})'><i class="fas fa-edit"></i> Editar</button>
                                <button onclick="borrarSocio('${s.dni}')"><i class="fas fa-trash"></i> Borrar</button>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        // FIX Registro (Punto 3)
        function adjuntarEventoRegistro() {
            const form = document.getElementById('registroForm');
            if(!form) return;
            form.onsubmit = async (e) => {
                e.preventDefault();
                const btn = form.querySelector('button');
                btn.innerText = "GUARDANDO...";
                btn.disabled = true;

                const datos = {
                    nombre: document.getElementById('nombre').value,
                    dni: document.getElementById('dni').value,
                    nacimiento: document.getElementById('nacimiento').value,
                    telefono: document.getElementById('telefono').value,
                    plan: document.getElementById('plan').value,
                    fechaInicio: document.getElementById('fechaInicioManual').value || new Date().toISOString()
                };

                try {
                    const res = await fetch('/api/registrar', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify(datos) 
                    });
                    if(res.ok) {
                        alert("Socio guardado correctamente");
                        switchTab('socios_lista'); 
                    }
                } catch (error) {
                    alert("Error al guardar");
                    btn.innerText = "DAR DE ALTA";
                    btn.disabled = false;
                }
            };
        }

        window.onload = () => switchTab('socios_lista');
    </script>
</body>
</html>
