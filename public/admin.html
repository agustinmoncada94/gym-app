<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECLON Admin - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary-red: #ff3333;   
            --bg-dark: #0a0a0a;       
            --card-dark: #121212;     
            --text-main: #ffffff;     
            --text-muted: #888888;    
            --status-green: #00ff66;
            --status-gray: #e0e0e0;
        }

        body { 
            margin: 0; display: flex; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); color: var(--text-main); 
        }

        /* SIDEBAR */
        .sidebar { 
            width: 250px; height: 100vh; 
            background: var(--card-dark); border-right: 1px solid #1a1a1a; 
            position: fixed; display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .sidebar-logo { max-width: 180px; height: auto; }

        .nav-link { 
            padding: 15px 25px; color: var(--text-muted); text-decoration: none; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; 
        }
        .nav-link.active { color: var(--text-main); background: #1a1a1a; border-right: 3px solid var(--primary-red); }

        .main-content { margin-left: 250px; flex: 1; padding: 30px; min-height: 100vh; }

        /* TABLA Y DISEÑO */
        .card { background: var(--card-dark); padding: 25px; border-radius: 12px; border: 1px solid #222; position: relative; }
        
        .tabla-socios { width: 100%; border-collapse: collapse; margin-top: 20px; }
        
        /* Línea 48 aprox. */
        .tabla-socios th, .tabla-socios td { 
            padding: 18px; 
            text-align: center; /* <-- Cambiar de left a center */
            border-bottom: 1px solid #1a1a1a; 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            overflow: visible; 
        }
        .tabla-socios th:last-child, .tabla-socios td:last-child { 
            border-right: none; 
            text-align: center; /* Asegura que la última columna esté centrada */
        }

        /* ESTADOS DE SOCIO */
        .status-pill { padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid transparent; }
        .status-ok { background: rgba(0, 255, 102, 0.1); color: #00ff66; border-color: #00ff66; }
        .status-vencido { background: rgba(255, 51, 51, 0.1); color: #ff3333; border-color: #ff3333; }
        .status-por-vencer { background: rgba(255, 165, 0, 0.1); color: #ffa500; border-color: #ffa500; }
        .status-suspendido { background: rgba(128, 128, 128, 0.1); color: #e0e0e0; border-color: #e0e0e0; }
        .status-prueba { background: rgba(255, 255, 153, 0.1); color: #ffff99; border-color: #ffff99; }

        /* INPUTS */
        .admin-input { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: 1px solid #333; background: #080808; color: var(--text-main); color-scheme: dark; 
        }
        .btn-admin { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary-red); color: #fff; font-weight: bold; cursor: pointer; }

        /* BOTÓN GESTIONAR */
        .dropbtn { 
            background: #1a1a1a; border: 1px solid #333; color: var(--text-main); 
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; 
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .dropbtn:hover { background: #222; border-color: var(--primary-red); }
        .dropbtn i { color: var(--primary-red); font-size: 0.9rem; }

        .dropdown { 
            position: relative; 
            display: inline-block; /* Esto permite que el centrado del TD funcione bien */
            vertical-align: middle;
        }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 40px; 
            background: #1a1a1a; min-width: 160px; border: 1px solid #444; 
            z-index: 9999; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        .dropdown-content button { color: white; padding: 12px; width: 100%; border: none; background: none; text-align: left; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid #222; }
        .dropdown-content button:hover { background: #252525; color: var(--primary-red); }
        .dropdown-content.show { 
    display: block !important; 
}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="img/logo.png" alt="DECLON" class="sidebar-logo">
        </div>
        <nav>
            <div class="nav-link active" onclick="switchTab('socios_lista')"><i class="fas fa-list"></i> Ver Socios</div>
            <div class="nav-link" onclick="switchTab('socios_registro')"><i class="fas fa-user-plus"></i> Registrar Socio</div>
            <div class="nav-link" onclick="switchTab('equipos')"><i class="fas fa-tools"></i> Equipos</div>
            <div class="nav-link" onclick="switchTab('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
        </nav>
    </div>

    <main class="main-content" id="view-container"></main>

    <script>
        let sociosGlobal = [];

        async function switchTab(tabName) {
            const container = document.getElementById('view-container');
            try {
                const response = await fetch(`${tabName}.html`);
                const html = await response.text();
                container.innerHTML = html;

                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                    if(link.getAttribute('onclick').includes(tabName)) link.classList.add('active');
                });

                if (tabName === 'socios_lista') cargarSocios();
                if (tabName === 'socios_registro') adjuntarEventoRegistro();
            } catch (e) { console.error(e); }
        }

        async function cargarSocios() {
            try {
                const r = await fetch('/api/socios/todos');
                sociosGlobal = await r.json();
                renderizarTabla(sociosGlobal);
            } catch (e) { console.error(e); }
        }

        function filtrarSocios() {
            const busqueda = document.getElementById('busqueda').value.toLowerCase();
            const filtrados = sociosGlobal.filter(s => 
                s.nombre.toLowerCase().includes(busqueda) || s.dni.includes(busqueda)
            );
            renderizarTabla(filtrados);
        }

        function renderizarTabla(lista) {
            const tbody = document.getElementById('lista');
            if(!tbody) return;
            const hoy = new Date();
            hoy.setHours(0,0,0,0);

            tbody.innerHTML = lista.map(s => {
                const desde = new Date(s.fechaInicio || s.fechaPago);
                const hasta = new Date(desde);
                hasta.setDate(desde.getDate() + 30);
                
                const diffTime = hasta - hoy;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const diasDesdeRegistro = Math.floor((hoy - desde) / (1000 * 60 * 60 * 24));

                let estadoTexto = "AL DÍA";
                let estadoClase = "status-ok";

                if (s.estado === "Suspendido") {
                    estadoTexto = "SUSPENDIDO"; estadoClase = "status-suspendido";
                } else if (s.plan === "Semana de Prueba") {
                    if (diasDesdeRegistro <= 7) { estadoTexto = "PRUEBA"; estadoClase = "status-prueba"; }
                    else { estadoTexto = "VENCIDO"; estadoClase = "status-vencido"; }
                } else if (hoy > hasta) {
                    estadoTexto = "VENCIDO"; estadoClase = "status-vencido";
                } else if (diffDays <= 5 && diffDays >= 0) {
                    estadoTexto = "POR VENCER"; estadoClase = "status-por-vencer";
                }

                return `
                <tr>
                    <td><b>${s.nombre.toUpperCase()}</b><br><small style="color:var(--text-muted)">${s.dni}</small></td>
                    <td><span style="color:var(--primary-red); font-weight:bold;">${s.plan || 'Musculacion'}</span></td>
                    <td><small style="color:var(--text-muted)">Desde: ${desde.toLocaleDateString('es-AR')}</small><br><b>Vence: ${hasta.toLocaleDateString('es-AR')}</b></td>
                    <td><span class="status-pill ${estadoClase}">${estadoTexto}</span></td>
                    <td style="text-align: center;">
                        <div class="dropdown">
                            <button class="dropbtn" onclick="toggleMenu(event, this)"><i class="fas fa-cog"></i> GESTIONAR</button>
                            <div class="dropdown-content">
                                <button onclick='cobrarMes("${s.dni}")'><i class="fas fa-money-bill-wave"></i> Cobrar Mes</button>
                                <button onclick='prepararEdicion(${JSON.stringify(s)})'><i class="fas fa-edit"></i> Editar Datos</button>
                                <div style="border-top: 1px solid #333; margin: 5px 0;"></div>
                                <button onclick="borrarSocio('${s.dni}')" style="color: #ff4444;"><i class="fas fa-trash"></i> Eliminar</button>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join(''); // <-- ESTO ES LO QUE FALTABA
        }

        function adjuntarEventoRegistro() {
            const form = document.getElementById('registroForm');
            if(!form) return;

            // --- NUEVO: Si venimos de "Editar", llenamos los campos ---
            if (window.socioAEditar) {
                document.getElementById('estado').value = s.estado || 'Activo'; // <--- AQUÍ: 's' todavía no existe
                const s = window.socioAEditar; // <--- AQUÍ: recién la defines
                document.getElementById('nombre').value = s.nombre;
                document.getElementById('dni').value = s.dni;
                document.getElementById('dni').readOnly = true; // El DNI no se debería cambiar
                document.getElementById('nacimiento').value = s.nacimiento || '';
                document.getElementById('telefono').value = s.telefono || '';
                document.getElementById('plan').value = s.plan || 'Musculación';
                
                // Cambiamos el texto del botón
                form.querySelector('button').innerText = "ACTUALIZAR DATOS";
            }

            form.onsubmit = async (e) => {
                e.preventDefault();
                const btn = form.querySelector('button');
                btn.innerText = "GUARDANDO...";
                btn.disabled = true;

                const datos = {
                    nombre: document.getElementById('nombre').value,
                    dni: document.getElementById('dni').value,
                    nacimiento: document.getElementById('nacimiento').value,
                    telefono: document.getElementById('telefono').value,
                    estado: document.getElementById('estado').value,
                    plan: document.getElementById('plan').value,
                    fechaInicio: document.getElementById('fechaInicioManual').value || (window.socioAEditar ? window.socioAEditar.fechaInicio : new Date().toISOString())
                };

                try {
                    // Si hay socioAEditar, usamos el método PUT (actualizar), sino POST (nuevo)
                    const url = window.socioAEditar ? `/api/socios/${datos.dni}` : '/api/registrar';
                    const metodo = window.socioAEditar ? 'PUT' : 'POST';

                    const res = await fetch(url, { 
                        method: metodo, 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify(datos) 
                    });

                    if(res.ok) {
                        alert(window.socioAEditar ? "Datos actualizados" : "Socio guardado");
                        window.socioAEditar = null; // Limpiamos la memoria después de editar
                        switchTab('socios_lista'); 
                    }
                } catch (error) {
                    alert("Error al procesar");
                    btn.innerText = "GUARDAR";
                    btn.disabled = false;
                }
            };
        }
async function cobrarMes(dni) {
            if(!confirm("¿Confirmar pago y renovar 30 días desde hoy?")) return;

            try {
                const res = await fetch('/api/socios/cobrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        dni: dni,
                        nuevaFecha: new Date().toISOString() // Fecha de hoy para el nuevo ciclo
                    })
                });

                if(res.ok) {
                    alert("Pago registrado. Ciclo actualizado.");
                    cargarSocios(); // Recarga la lista para ver los cambios
                } else {
                    alert("Error al procesar el pago");
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión");
            }
        }
        function toggleMenu(event, btn) {
    event.stopPropagation(); // Evita que el clic se propague
    
    // Cerramos cualquier otro menú que esté abierto
    document.querySelectorAll('.dropdown-content').forEach(menu => {
        if (menu !== btn.nextElementSibling) menu.classList.remove('show');
    });

    // Abrimos o cerramos el menú actual
    btn.nextElementSibling.classList.toggle('show');
}

// Cerrar menús si se hace clic fuera de ellos
window.onclick = function(event) {
    if (!event.target.matches('.dropbtn')) {
        document.querySelectorAll('.dropdown-content').forEach(menu => {
            menu.classList.remove('show');
        });
    }
}
function prepararEdicion(socio) {
            // Guardamos los datos en una variable global para usarlos en la otra pestaña
            window.socioAEditar = socio; 
            // Cambiamos a la pestaña de registro
            switchTab('socios_registro');
        }
        window.onload = () => switchTab('socios_lista');
    </script>
</body>
</html>
