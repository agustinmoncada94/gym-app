<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - GYM Admin</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="admin-layout">
        
        <div class="card">
            <h2><i class="fas fa-user-plus"></i> Registrar Socio</h2>
            <form id="registroForm">
                <input type="text" id="nombre" class="admin-input" placeholder="Nombre Completo" required>
                <input type="tel" id="dni" class="admin-input" placeholder="DNI (sin puntos)" required inputmode="numeric">
                
                <label style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-left: 5px;">Fecha de Nacimiento</label>
                <input type="date" id="nacimiento" class="admin-input" required>
                
                <input type="text" id="direccion" class="admin-input" placeholder="Dirección">
                <input type="tel" id="telefono" class="admin-input" placeholder="Teléfono">
                
                <button type="submit" id="btnEnviar" class="btn-admin">DAR DE ALTA</button>
            </form>
            <div id="resultado" class="mensaje"></div>
        </div>

        <div class="card">
            <h2><i class="fas fa-users"></i> Lista de Clientes</h2>
            <div style="overflow-x: auto;">
                <table class="tabla-socios">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaSocios">
                        <tr>
                            <td colspan="4" style="text-align:center; color:gray; padding:20px;">Cargando socios...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // --- FUNCIÓN PARA REGISTRAR ---
        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const divResultado = document.getElementById('resultado');
            
            btn.disabled = true;
            btn.innerText = "REGISTRANDO...";
            divResultado.innerText = "";

            const datos = {
                nombre: document.getElementById('nombre').value,
                dni: document.getElementById('dni').value,
                nacimiento: document.getElementById('nacimiento').value,
                direccion: document.getElementById('direccion').value,
                telefono: document.getElementById('telefono').value
            };

            try {
                const response = await fetch('/api/registrar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });

                const res = await response.json();

                if (response.ok) {
                    alert("¡Socio registrado con éxito!");
                    e.target.reset();
                    // Aquí podrías llamar a una función para refrescar la lista
                } else {
                    alert("Error: " + (res.error || res.message));
                }
            } catch (error) {
                alert("Error de conexión con el servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = "DAR DE ALTA";
            }
        };

        // --- MUESTRA DE SOCIO (Ejemplo visual como en las fotos) ---
        // Esto lo haremos dinámico cuando creemos la ruta de "obtener socios"
        const lista = document.getElementById('listaSocios');
        lista.innerHTML = `
            <tr>
                <td>Benito Agustin Moncada</td>
                <td>12345678</td>
                <td><span class="status-badge active">ACTIVO</span></td>
                <td>
                    <button style="background:none; border:none; color:#c5e061; cursor:pointer; margin-right:10px;"><i class="fas fa-edit"></i></button>
                    <button style="background:none; border:none; color:#e57373; cursor:pointer;"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `;
    </script>
</body>
</html>
