<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM Admin - Gestión de Socios</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="card">
            <h2><i class="fas fa-user-plus"></i> Registrar Socio</h2>
            <form id="registroForm">
                <input type="text" id="nombre" class="admin-input" placeholder="Nombre Completo" required>
                <input type="text" id="dni" class="admin-input" placeholder="DNI (sin puntos)" required>
                <input type="date" id="nacimiento" class="admin-input" required>
                <input type="text" id="direccion" class="admin-input" placeholder="Dirección">
                <input type="tel" id="telefono" class="admin-input" placeholder="Teléfono">
                <button type="submit" id="btn" class="btn-admin">DAR DE ALTA</button>
            </form>
        </div>

        <div class="card">
            <h2><i class="fas fa-users"></i> Lista de Clientes</h2>
            <div style="overflow-x: auto;">
                <table class="tabla-socios">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Función para cargar la lista desde la API que ya sabemos que funciona
        async function cargarSocios() {
            const tabla = document.getElementById('lista');
            tabla.innerHTML = '<tr><td colspan="4">Cargando socios...</td></tr>';

            try {
                // Usamos la ruta exacta que te funcionó en la captura
                const respuesta = await fetch('/api/socios/todos');
                const socios = await respuesta.json();

                if (socios.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="4">No hay socios registrados.</td></tr>';
                    return;
                }

                // Dibujamos la tabla con los datos reales
                tabla.innerHTML = socios.map(s => `
                    <tr>
                        <td>${s.nombre}</td>
                        <td>${s.dni}</td>
                        <td>${s.telefono || '-'}</td>
                        <td>
                            <button onclick="borrarSocio('${s.dni}')" class="btn-borrar">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                tabla.innerHTML = '<tr><td colspan="4" style="color:red;">Error al cargar datos. Reintente.</td></tr>';
            }
        }

        // Función para borrar
        async function borrarSocio(dni) {
            if (confirm('¿Seguro que desea eliminar este socio?')) {
                await fetch(`/api/socios/${dni}`, { method: 'DELETE' });
                cargarSocios();
            }
        }

        // Manejo del formulario
        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true;

            const datos = {
                nombre: document.getElementById('nombre').value,
                dni: document.getElementById('dni').value,
                nacimiento: document.getElementById('nacimiento').value,
                direccion: document.getElementById('direccion').value,
                telefono: document.getElementById('telefono').value
            };

            try {
                const res = await fetch('/api/registrar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });
                
                if(res.ok) {
                    e.target.reset();
                    cargarSocios();
                }
            } catch (err) {
                alert("Error al guardar");
            } finally {
                btn.disabled = false;
            }
        };

        // Cargar al iniciar
        window.onload = cargarSocios;
    </script>
</body>
</html>
