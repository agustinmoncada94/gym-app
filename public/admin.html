<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DECLON Admin - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="admin.css" />
</head>
<body>
    <div class="admin-shell">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-wrap">
                    <img src="img/logo.png" alt="DECLON" class="sidebar-logo" />
                </div>
                <div>
                    <p class="sidebar-kicker">Panel administrativo</p>
                    <h1>DECLON ADMIN</h1>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-link active" onclick="switchTab('socios_lista')">
                    <i class="fas fa-list"></i>
                    <span>Ver Socios</span>
                </button>

                <button class="nav-link" onclick="switchTab('socios_registro')">
                    <i class="fas fa-user-plus"></i>
                    <span>Registrar Socio</span>
                </button>

                <button class="nav-link" onclick="switchTab('equipos')">
                    <i class="fas fa-dumbbell"></i>
                    <span>Equipamiento</span>
                </button>

                <button class="nav-link" onclick="switchTab('dashboard')">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard KPI</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-box">
                    <span class="status-dot"></span>
                    <span>Sistema activo</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <p class="topbar-kicker">Gestión integral del gimnasio</p>
                    <h2>Panel de Control</h2>
                </div>
                <div class="topbar-actions">
                    <button class="ghost-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                    <button class="ghost-btn">
                        <i class="fas fa-user-shield"></i>
                    </button>
                </div>
            </header>

            <section id="view-container"></section>
        </main>
    </div>

    <script>
        let sociosGlobal = [];
        const sociosMap = new Map();

        // ── Carga de tabs generales ──────────────────────────────────────────
        async function verDetalle(dni) {
            const container = document.getElementById('view-container');
            const html = await (await fetch('socio_detalle.html')).text();
            container.innerHTML = html;

            const s = sociosMap.get(dni);
            if (!s) return;

            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const desde = new Date(s.fechaInicio || s.fechaPago);
            const hasta = new Date(desde); hasta.setDate(desde.getDate() + 30);
            const diffDays = Math.ceil((hasta - hoy) / (1000 * 60 * 60 * 24));

            let estadoTexto = 'AL DÍA', estadoColor = 'rgba(53,224,138,0.08)', estadoBorder = 'rgba(53,224,138,0.25)';
            if (s.estado === 'Suspendido')                         { estadoTexto = 'SUSPENDIDO'; estadoColor = 'rgba(255,92,92,0.08)';  estadoBorder = 'rgba(255,92,92,0.25)'; }
            else if (hoy > hasta)                                  { estadoTexto = 'VENCIDO';    estadoColor = 'rgba(255,92,92,0.08)';  estadoBorder = 'rgba(255,92,92,0.25)'; }
            else if (s.plan === 'Semana de Prueba' && diffDays>23) { estadoTexto = 'PRUEBA';     estadoColor = 'rgba(255,179,71,0.08)'; estadoBorder = 'rgba(255,179,71,0.25)'; }
            else if (diffDays <= 5)                                { estadoTexto = 'POR VENCER'; estadoColor = 'rgba(255,179,71,0.08)'; estadoBorder = 'rgba(255,179,71,0.25)'; }

            const iniciales = s.nombre.split(' ').map(p => p[0]).slice(0,2).join('').toUpperCase();
            const fmt = d => d ? new Date(d).toLocaleDateString('es-AR') : '—';

            document.getElementById('det-avatar').innerText        = iniciales;
            document.getElementById('det-nombre').innerText        = s.nombre.toUpperCase();
            document.getElementById('det-dni').innerText           = s.dni;
            document.getElementById('det-desde').innerText         = fmt(s.fechaInicio || s.fechaPago);
            document.getElementById('det-estado-texto').innerText  = estadoTexto;
            document.getElementById('det-vencimiento').innerText   = fmt(hasta);
            document.getElementById('det-dias').innerText          = diffDays > 0 ? diffDays + ' días' : 'Vencido';
            document.getElementById('det-plan').innerText          = s.plan || 'Musculación';
            document.getElementById('det-info-nombre').innerText   = s.nombre;
            document.getElementById('det-info-dni').innerText      = s.dni;
            document.getElementById('det-info-nac').innerText      = s.nacimiento ? fmt(s.nacimiento) : '—';
            document.getElementById('det-info-tel').innerText      = s.telefono || '—';
            document.getElementById('det-info-plan').innerText     = s.plan || 'Musculación';
            document.getElementById('det-info-alta').innerText     = fmt(s.fechaInicio || s.fechaPago);
            document.getElementById('det-info-vence').innerText    = fmt(hasta);
            document.getElementById('det-info-estado').innerText   = estadoTexto;

            // Color dinámico del badge de estado
            const badgeEstado = document.getElementById('det-badge-estado');
            badgeEstado.style.background    = estadoColor;
            badgeEstado.style.borderColor   = estadoBorder;

            // Acciones rápidas
            document.getElementById('det-btn-cobrar').onclick  = async () => { await cobrarMes(dni); verDetalle(dni); };
            document.getElementById('det-btn-editar').onclick  = () => prepararEdicion(s);
            document.getElementById('det-btn-eliminar').onclick = () => { borrarSocio(dni); };

            // ── Historial de pagos ────────────────────────────────────────
            let pagosData = [];

            async function cargarPagos() {
                const res = await fetch(`/api/socios/${dni}/pagos`);
                pagosData = await res.json();
                renderPagos();
            }

            function renderPagos() {
                const buscar  = document.getElementById('hist-buscar').value.toLowerCase();
                const estado  = document.getElementById('hist-estado').value;
                const metodo  = document.getElementById('hist-metodo').value;
                const orden   = document.getElementById('hist-orden').value;
                const body    = document.getElementById('historial-body');

                let lista = [...pagosData];
                if (buscar) lista = lista.filter(p => p.concepto.toLowerCase().includes(buscar) || p.monto.includes(buscar));
                if (estado) lista = lista.filter(p => p.estado === estado);
                if (metodo) lista = lista.filter(p => p.metodo === metodo);
                if (orden === 'antiguos') lista.reverse();

                if (!lista.length) {
                    body.innerHTML = '<div class="historial-empty">Sin movimientos registrados</div>';
                    return;
                }

                body.innerHTML = lista.map(p => {
                    const cls = p.estado === 'Pagado' ? 'pill-pagado' : 'pill-pendiente';
                    return `
                    <div class="historial-row">
                        <span>${p.fecha}</span>
                        <span>${p.concepto}</span>
                        <span class="historial-monto">${p.monto || '—'}</span>
                        <span>${p.metodo}</span>
                        <span><span class="hist-pill ${cls}">${p.estado}</span></span>
                        <span><button class="det-btn-volver" style="font-size:0.8rem;padding:6px 12px">Ver detalle</button></span>
                    </div>`;
                }).join('');
            }

            // Filtros en tiempo real
            ['hist-buscar','hist-estado','hist-metodo','hist-orden'].forEach(id => {
                document.getElementById(id).addEventListener('input', renderPagos);
                document.getElementById(id).addEventListener('change', renderPagos);
            });

            // Modal registrar pago
            const modal = document.getElementById('modal-pago');
            document.getElementById('det-btn-nuevo-pago').onclick = () => modal.style.display = 'flex';
            document.getElementById('mp-cancelar').onclick        = () => modal.style.display = 'none';
            document.getElementById('mp-guardar').onclick = async () => {
                const body = {
                    concepto: document.getElementById('mp-concepto').value || 'Mensual',
                    monto:    document.getElementById('mp-monto').value,
                    metodo:   document.getElementById('mp-metodo').value,
                    estado:   document.getElementById('mp-estado').value
                };
                await fetch(`/api/socios/${dni}/pagos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                modal.style.display = 'none';
                await cargarPagos();
            };

            // Exportar CSV
            document.getElementById('det-btn-exportar').onclick = () => {
                const csv = ['Fecha,Concepto,Monto,Método,Estado',
                    ...pagosData.map(p => `${p.fecha},${p.concepto},${p.monto},${p.metodo},${p.estado}`)
                ].join('\n');
                const a = document.createElement('a');
                a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
                a.download = `pagos_${s.nombre.replace(/ /g,'_')}.csv`;
                a.click();
            };

            cargarPagos();
        }

        async function switchTab(tabName) {
            const container = document.getElementById('view-container');
            try {
                const html = await (await fetch(`${tabName}.html`)).text();
                container.innerHTML = html;

                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('onclick').includes(tabName)) {
                        link.classList.add('active');
                    }
                });

                // Re-ejecutar scripts inline del HTML cargado (innerHTML no los ejecuta automáticamente)
                container.querySelectorAll('script').forEach(oldScript => {
                    const s = document.createElement('script');
                    s.textContent = oldScript.textContent;
                    document.body.appendChild(s);
                    document.body.removeChild(s);
                });

                if (tabName === 'socios_lista') await cargarSocios();

                if (tabName === 'socios_registro') {
                    // Modo REGISTRO NUEVO
                    const form = document.getElementById('registroForm');
                    if (form) {
                        form.addEventListener('submit', async function (e) {
                            e.preventDefault();
                            const datos = leerFormulario();
                            if (!datos.fechaInicio) datos.fechaInicio = new Date().toISOString();
                            await guardarSocio('POST', '/api/registrar', datos);
                        });
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        // ── Edición de un socio existente ────────────────────────────────────
        async function prepararEdicion(socio) {
            const container = document.getElementById('view-container');
            try {
                const html = await (await fetch('socios_registro.html')).text();
                container.innerHTML = html;

                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('onclick').includes('socios_registro')) {
                        link.classList.add('active');
                    }
                });

                // Rellenar campos
                const campos = {
                    nombre: socio.nombre,
                    dni: socio.dni,
                    telefono: socio.telefono,
                    plan: socio.plan,
                    nacimiento: socio.nacimiento ? socio.nacimiento.split('T')[0] : '',
                    estado: socio.estado,
                    fechaInicio: (socio.fechaInicio || socio.fechaPago || '').split('T')[0]
                };
                for (const id in campos) {
                    const el = document.getElementById(id);
                    if (el) el.value = campos[id];
                }

                // DNI no editable y nacimiento no requerido en edición
                const inputDni = document.getElementById('dni');
                if (inputDni) inputDni.readOnly = true;
                const inputNac = document.getElementById('nacimiento');
                if (inputNac) inputNac.removeAttribute('required');

                // Dejar solo "Suspendido" en el select de estado, sin preseleccionar
                const selectEstado = document.getElementById('estado');
                if (selectEstado) {
                    selectEstado.innerHTML = `
                        <option value="" disabled selected>-- Seleccionar estado --</option>
                        <option value="Suspendido">Suspendido (Acceso denegado)</option>`;
                }

                const titulo = document.querySelector('.card h1');
                if (titulo) titulo.innerText = 'EDITAR SOCIO';

                // Botón type="button" → el form submit NUNCA se dispara
                const dniOriginal = socio.dni;
                const btn = document.querySelector('#registroForm button[type="submit"]');
                if (btn) {
                    btn.type = 'button';
                    btn.innerText = 'GUARDAR CAMBIOS';
                    btn.classList.add('btn-edit-mode');
                    btn.onclick = async () => {
                        const datos = leerFormulario();
                        datos.dni = dniOriginal;
                        await guardarSocio('PUT', `/api/socios/${dniOriginal}`, datos);
                    };
                }
            } catch (err) {
                console.error(err);
            }
        }

        // ── Helpers ──────────────────────────────────────────────────────────
        function leerFormulario() {
            return {
                nombre:     document.getElementById('nombre').value.trim(),
                dni:        document.getElementById('dni').value.trim(),
                nacimiento: document.getElementById('nacimiento').value,
                telefono:   document.getElementById('telefono').value.trim(),
                plan:       document.getElementById('plan').value,
                estado:     document.getElementById('estado').value,
                fechaInicio: document.getElementById('fechaInicio').value || new Date().toISOString()
            };
        }

        async function guardarSocio(method, url, datos) {
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                const resultado = await res.json();
                if (resultado.success) {
                    switchTab('socios_lista');
                } else {
                    alert('Error al guardar: ' + (resultado.error || 'desconocido'));
                }
            } catch (err) {
                alert('Error de conexión: ' + err.message);
            }
        }

        // ── Socios ───────────────────────────────────────────────────────────
        async function cargarSocios() {
            try {
                const r = await fetch('/api/socios/todos');
                sociosGlobal = await r.json();
                filtrarSocios();
            } catch (e) {
                console.error(e);
            }
        }

        function filtrarSocios() {
            const inputBusqueda = document.getElementById('busqueda');
            const contadorLabel = document.getElementById('contador-socios');
            if (!inputBusqueda) return;

            const busqueda = inputBusqueda.value.toLowerCase();
            const filtroEstado = (document.getElementById('filtroEstado')?.value || 'todos');
            const filtroPlan  = (document.getElementById('filtroPlan')?.value  || 'todos');

            const filtrados = sociosGlobal.filter(s => {
                const coincideTexto = s.nombre.toLowerCase().includes(busqueda) || s.dni.includes(busqueda);
                const coincidePlan  = filtroPlan === 'todos' || (s.plan || 'Musculación') === filtroPlan;
                return coincideTexto && coincidePlan;
            });

            renderizarTabla(filtrados, filtroEstado);
            if (contadorLabel) contadorLabel.innerText = filtrados.length;
        }

        function renderizarTabla(lista, filtroEstado = 'todos') {
            const tbody = document.getElementById('lista');
            if (!tbody) return;

            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            sociosMap.clear();

            const filas = [];

            lista.forEach(s => {
                sociosMap.set(s.dni, s);

                const desde = new Date(s.fechaInicio || s.fechaPago);
                const hasta = new Date(desde);
                hasta.setDate(desde.getDate() + 30);

                const diffDays = Math.ceil((hasta - hoy) / (1000 * 60 * 60 * 24));

                let estadoTexto = "AL DÍA", estadoClase = "status-ok";

                if (s.estado === "Suspendido") {
                    estadoTexto = "SUSPENDIDO";
                    estadoClase = "status-suspendido";
                } else if (hoy > hasta) {
                    estadoTexto = "VENCIDO";
                    estadoClase = "status-vencido";
                } else if (s.plan === "Semana de Prueba" && diffDays > 23) {
                    estadoTexto = "PRUEBA";
                    estadoClase = "status-prueba";
                } else if (diffDays <= 5 && diffDays >= 0) {
                    estadoTexto = "POR VENCER";
                    estadoClase = "status-por-vencer";
                }

                // Aplicar filtro de estado
                if (filtroEstado !== 'todos' && estadoTexto !== filtroEstado) return;

                filas.push(`
                <tr>
                    <td class="td-socio">
                        <b class="nombre-socio nombre-link" onclick="verDetalle('${s.dni}')">${s.nombre.toUpperCase()}</b>
                        <small class="dni-socio">${s.dni}</small>
                    </td>
                    <td>
                        <span class="plan-pill">${s.plan || 'Musculación'}</span>
                    </td>
                    <td>
                        <small class="fecha-desde">Desde: ${desde.toLocaleDateString('es-AR')}</small>
                        <b class="fecha-hasta">Vence: ${hasta.toLocaleDateString('es-AR')}</b>
                    </td>
                    <td>
                        <span class="status-pill ${estadoClase}">${estadoTexto}</span>
                    </td>
                    <td>
                        <button class="dropbtn" onclick="toggleMenu(event, '${s.dni}')">
                            <i class="fas fa-cog"></i> Gestionar
                        </button>
                    </td>
                </tr>`);
            });

            tbody.innerHTML = filas.join('');

            // Actualizar contador con los socios visibles
            const contador = document.getElementById('contador-socios');
            if (contador) contador.innerText = filas.length;
        }

        async function cobrarMes(dni) {
            return new Promise((resolve) => {
                // Crear modal
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-box">
                        <h3 class="modal-titulo">💰 Cobrar Mes</h3>
                        <p style="font-size:.85rem;color:var(--text-faint);margin:-8px 0 16px">Completá los datos del pago para registrarlo en el historial.</p>
                        <div class="modal-form">
                            <label>Monto
                                <input type="number" id="cm-monto" class="hist-input" placeholder="Ej: 15000" min="0">
                            </label>
                            <label>Método de pago
                                <select id="cm-metodo" class="hist-input">
                                    <option value="Efectivo">Efectivo</option>
                                    <option value="Transferencia">Transferencia</option>
                                    <option value="QR">QR</option>
                                </select>
                            </label>
                            <label>Concepto
                                <input type="text" id="cm-concepto" class="hist-input" placeholder="Ej: Cuota abril 2026">
                            </label>
                        </div>
                        <div class="modal-actions" style="margin-top:20px">
                            <button class="det-btn-volver" id="cm-cancelar">Cancelar</button>
                            <button class="eq-btn-primary" id="cm-confirmar">Confirmar cobro</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);

                // Auto-completar concepto con mes actual
                const ahora = new Date();
                const mes = ahora.toLocaleString('es-AR', { month: 'long' });
                const anio = ahora.getFullYear();
                document.getElementById('cm-concepto').value = `Mensual ${mes} ${anio}`;

                document.getElementById('cm-cancelar').onclick = () => {
                    overlay.remove();
                    resolve(false);
                };

                document.getElementById('cm-confirmar').onclick = async () => {
                    const montoRaw  = document.getElementById('cm-monto').value.trim();
                    const metodo    = document.getElementById('cm-metodo').value;
                    const concepto  = document.getElementById('cm-concepto').value.trim() || `Mensual ${mes} ${anio}`;

                    // Formatear monto como $15.000
                    const montoNum  = parseInt(montoRaw, 10);
                    const montoFmt  = montoRaw
                        ? '$' + montoNum.toLocaleString('es-AR')
                        : '';

                    overlay.remove();

                    try {
                        const res = await fetch('/api/socios/cobrar', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                dni,
                                nuevaFecha: new Date().toISOString(),
                                pago: { concepto, monto: montoFmt, metodo }
                            })
                        });
                        const resultado = await res.json();
                        if (resultado.success) {
                            await cargarSocios();
                            resolve(true);
                        } else {
                            alert('Error al cobrar: ' + (resultado.mensaje || resultado.error || 'desconocido'));
                            resolve(false);
                        }
                    } catch (err) {
                        alert('Error de conexión: ' + err.message);
                        resolve(false);
                    }
                };
            });
        }

       async function borrarSocio(dni) {
    // Convertimos a String por si el DNI viene como número y pierde ceros
    const dniLimpio = String(dni).trim(); 
    
    if (!confirm(`¿Eliminar socio DNI: ${dniLimpio}?`)) return;
    
    try {
        const res = await fetch(`/api/socios/${dniLimpio}`, { 
            method: 'DELETE' 
        });
        
        if (res.ok) {
            alert("Socio eliminado con éxito");
            cargarSocios(); // Recarga la lista para que desaparezca de la pantalla
        } else {
            const error = await res.json();
            alert("Error del servidor: " + error.mensaje);
        }
    } catch (e) {
        alert("Error de conexión al intentar eliminar");
    }
}

        function toggleMenu(event, dni) {
            event.stopPropagation();

            const existing = document.getElementById('global-dropdown');
            if (existing && existing.dataset.dni === String(dni)) {
                cerrarMenu();
                return;
            }
            cerrarMenu();

            const socio = sociosMap.get(dni);
            if (!socio) return;

            const menu = document.createElement('div');
            menu.id = 'global-dropdown';
            menu.dataset.dni = String(dni);

            const b1 = document.createElement('button');
            b1.innerHTML = '<i class="fas fa-money-bill-wave"></i> Cobrar Mes';
            b1.onclick = (e) => { e.stopPropagation(); cobrarMes(dni); cerrarMenu(); };

            const b2 = document.createElement('button');
            b2.innerHTML = '<i class="fas fa-edit"></i> Editar Datos';
            b2.onclick = (e) => { e.stopPropagation(); prepararEdicion(socio); cerrarMenu(); };

            const b3 = document.createElement('button');
            b3.className = 'danger-action';
            b3.innerHTML = '<i class="fas fa-trash"></i> Eliminar';
            b3.onclick = (e) => { e.stopPropagation(); borrarSocio(dni); cerrarMenu(); };

            menu.append(b1, b2, b3);
            document.body.appendChild(menu);

            const r = event.currentTarget.getBoundingClientRect();
            const mH = menu.offsetHeight || 130;
            const mW = 210;
            const top = (window.innerHeight - r.bottom < mH + 10) ? r.top - mH - 6 : r.bottom + 6;
            const left = Math.max(8, Math.min(r.right - mW, window.innerWidth - mW - 8));

            menu.style.cssText = `position:fixed; top:${top}px; left:${left}px; z-index:99999;`;
        }

        function cerrarMenu() {
            const m = document.getElementById('global-dropdown');
            if (m) m.remove();
        }
        async function borradoEmergencia(identificador) {
    if (!confirm(`¿Forzar la eliminación de: ${identificador}?`)) return;
    
    // Obtenemos todos los socios primero para encontrar el ID real
    const response = await fetch('/api/socios/todos');
    const socios = await response.json();
    
    // Buscamos el socio que coincida con lo que ves en pantalla
    const socioEncontrado = socios.find(s => 
        s.nombre.includes(identificador) || s.dni.includes(identificador)
    );

    if (socioEncontrado) {
        const res = await fetch(`/api/socios/${socioEncontrado.dni}`, { method: 'DELETE' });
        if (res.ok) {
            alert("¡Eliminado con éxito!");
            location.reload(); // Recargamos para limpiar la vista
        }
    } else {
        alert("No se encontró ese socio en la base de datos real.");
    }
}

        window.onclick = () => cerrarMenu();

        window.onload = () => switchTab('socios_lista');
    </script>
</body>
</html>
