<div class="card">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--primary-red); margin: 0; font-size: 2rem; letter-spacing: 2px;">LISTA DE SOCIOS</h1>
        <div style="width: 60px; height: 4px; background: var(--primary-red); margin: 10px auto;"></div>
    </div>

    <div style="margin-bottom: 20px; position: relative;">
        <input type="text" id="busqueda" class="admin-input" placeholder="🔍 Buscar por nombre o DNI..." onkeyup="filtrarSocios()" style="padding-left: 40px;">
    </div>
    
    <div class="tabla-container">
        <table class="tabla-socios">
            <thead>
                <tr>
                    <th>Socio</th>
                    <th>Plan</th>
                    <th>Ciclo de Pago</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
</div>
