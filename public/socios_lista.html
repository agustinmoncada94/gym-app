<div class="card">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--primary-red); margin: 0; font-size: 2rem; letter-spacing: 2px;">LISTA DE SOCIOS</h1>
        <div style="width: 60px; height: 4px; background: var(--primary-red); margin: 10px auto;"></div>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="busqueda" class="admin-input" placeholder="Buscar por nombre o DNI..." onkeyup="filtrarSocios()">
        </div>

        <div class="filter-wrapper">
            <select id="filtroEstado" class="admin-input select-custom" onchange="filtrarSocios()">
                <option value="todos">📊 TODOS LOS ESTADOS</option>
                <option value="AL DÍA">✅ AL DÍA</option>
                <option value="VENCIDO">❌ VENCIDOS</option>
                <option value="POR VENCER">⚠️ POR VENCER</option>
                <option value="SUSPENDIDO">🚫 SUSPENDIDOS</option>
                <option value="PRUEBA">🧪 PRUEBA</option>
            </select>
        </div>

        <div class="filter-wrapper">
            <select id="filtroPlan" class="admin-input select-custom" onchange="filtrarSocios()">
                <option value="todos">🏋️ TODOS LOS PLANES</option>
                <option value="Musculación">Musculación</option>
                <option value="Plan Full">Plan Full</option>
                <option value="Personalizado">Personalizado</option>
                <option value="Semana de Prueba">Semana de Prueba</option>
            </select>
        </div>
    </div>

    <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
        <div style="background: rgba(255, 51, 51, 0.1); border: 1px solid var(--primary-red); padding: 8px 15px; border-radius: 8px;">
            <i class="fas fa-users" style="color: var(--primary-red); margin-right: 10px;"></i>
            <span style="color: var(--text-muted); font-size: 0.9rem; font-weight: bold;">
                SOCIOS ENCONTRADOS: <span id="contador-socios" style="color: white; font-size: 1.1rem;">0</span>
            </span>
        </div>
    </div>
    
    <div style="overflow: visible;">
        <table class="tabla-socios">
            <thead>
                <tr>
                    <th style="width: 25%;">Socio</th>
                    <th style="width: 15%;">Plan</th>
                    <th style="width: 25%;">Ciclo de Pago</th>
                    <th style="width: 15%;">Estado</th>
                    <th style="width: 20%; text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="lista">
                </tbody>
        </table>
    </div>
</div>
